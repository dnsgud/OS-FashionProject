<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Look_Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* 로그인 창과 똑같은 화사하고 깔끔한 배경으로 수정했어 */
        .signup-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 200px);
            background-color: #ffffff; /* 완전히 하얀 바탕 */
            padding: 60px 20px;
        }

        /* 로그인 창의 부드러운 그림자와 둥근 테두리 감성을 그대로 이어받았어 */
        .signup-box {
            background: #ffffff;
            border-radius: 24px;
            padding: 45px 35px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.04); /* 아주 은은하고 투명한 그림자 */
            border: 1px solid #f8fafc;
            box-sizing: border-box;
        }

        .signup-box h2 {
            font-size: 1.7rem;
            font-weight: 800;
            margin: 0 0 30px 0;
            color: #000000; /* 로그인 창의 Look_Up 타이틀처럼 깊은 블랙 */
            text-align: center;
            letter-spacing: -0.5px;
        }

        .input-row {
            margin-bottom: 20px;
        }

        .input-row label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: #475569;
            margin-bottom: 6px;
            padding-left: 2px;
        }

        /* 로그인 창의 인풋 박스 스타일처럼 연하고 깔끔하게 변경 */
        .input-row input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            background-color: #f8fafc; /* 로그인 창 내부의 연한 그레이 톤 배경 */
            font-size: 0.95rem;
            font-family: 'Pretendard', sans-serif;
            box-sizing: border-box;
            transition: all 0.2s;
            color: #0f172a;
        }

        /* 마우스를 올리거나 클릭했을 때 스타일 */
        .input-row input:hover {
            border-color: #cbd5e1;
        }

        .input-row input:focus {
            outline: none;
            border-color: #94a3b8;
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 35px;
        }

        .btn-group button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Pretendard', sans-serif;
            transition: all 0.2s;
            border: none;
        }

        /* 로그인 버튼처럼 어둡고 묵직한 메인 확인 버튼 */
        .submit-btn {
            background: #1e293b;
            color: white;
        }

        .submit-btn:hover {
            background: #0f172a;
        }

        /* 취소 버튼은 배경과 부드럽게 어우러지는 톤으로 설정 */
        .cancel-btn {
            background: #f1f5f9;
            color: #64748b;
        }

        .cancel-btn:hover {
            background: #e2e8f0;
            color: #475569;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html" style="color: inherit; text-decoration: none;">Look_Up</a>
            </div>
            <ul>
                <li>
                    <a href="guide.html" class="nav-link" style="color: inherit; text-decoration: none;">
                        <i class="fas fa-book"></i> Guide
                    </a>
                </li>
                <li>
                    <a href="codi.html" class="nav-link" style="color: inherit; text-decoration: none;">
                        <i class="fas fa-tshirt"></i> Codi
                    </a>
                </li>
                <li class="dropdown-wrapper">
                    <a href="#" class="nav-link" id="my-menu-btn" style="color: inherit; text-decoration: none;" onclick="toggleDropdown(event)">
                        <i class="fas fa-user"></i> My
                    </a>
                    <div class="dropdown-menu" id="my-dropdown">
                        <a href="my_closet.html">👗 내 옷장</a>
                        <a href="my_scrap.html">🔖 스크랩북</a>
                        <a href="my_profile.html">⚙️ 스타일 설정</a>
                    </div>
                </li>
                <li>
                    <button class="login-btn" onclick="location.href='login.html'">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <main class="signup-container">
        <div class="signup-box">
            <h2>회원가입</h2>
            
            <form id="signup-form">
                <div class="input-row">
                    <label for="nickname">닉네임</label>
                    <input type="text" id="nickname" placeholder="사용할 닉네임을 입력하세요" required>
                </div>

                <div class="input-row">
                    <label for="username">아이디</label>
                    <input type="text" id="username" placeholder="아이디를 입력하세요" required>
                </div>

                <div class="input-row">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="6자리 이상 입력하세요" required>
                </div>

                <div class="input-row">
                    <label for="password-check">비밀번호 확인</label>
                    <input type="password" id="password-check" placeholder="비밀번호를 한번 더 입력하세요" required>
                </div>

                <div class="input-row">
                    <label for="email">이메일 주소</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>

                <div class="btn-group">
                    <button type="button" class="cancel-btn" onclick="location.href='login.html'">취소</button>
                    <button type="submit" class="submit-btn">확인</button>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">Look_Up</div>
            <div class="footer-links">
                <a href="#" onclick="event.preventDefault(); openPolicyModal('terms')">이용약관</a>
                <a href="#" onclick="event.preventDefault(); openPolicyModal('privacy')">개인정보 처리방침</a>
            </div>
            <p class="footer-info">
                주식회사 코디픽 | 대표: 김코디 | 사업자등록번호: 123-45-67890<br>
                충청북도 청주시 서원구 충대로 1 (충북대학교)<br>
                이메일: contact@codipick.com | 통신판매업신고: 2026-청주-1234
            </p>
            <p class="footer-copyright">
                &copy; 2026 CODI PICK. All rights reserved.
            </p>
        </div>
    </footer>

    <div id="policy-modal" class="modal-overlay" onclick="if(event.target == this) closePolicyModal()">
        <div class="modal-content" style="width: 90%; max-width: 450px; max-height: 70vh; overflow-y: auto; text-align: left; padding: 40px 30px;">
            <button class="close-btn" onclick="closePolicyModal()">&times;</button>
            <div class="modal-body">
                <h3 id="policy-title" style="font-size: 22px; font-weight: 800; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #212529;">제목</h3>
                <div id="policy-desc" style="color: #495057; line-height: 1.7; font-size: 14px; white-space: pre-wrap;">여기에 약관 내용이 들어갑니다.</div>
                <div style="text-align: center; margin-top: 30px;">
                    <button onclick="closePolicyModal()" style="padding: 12px 40px; background: #212529; color: #fff; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;">확인</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = '여기에_URL_입력'
    const supabaseKey = '여기에_KEY_입력'
    
    let supabase = null
    if (supabaseUrl !== '여기에_URL_입력' && supabaseKey !== '여기에_KEY_입력') {
        supabase = createClient(supabaseUrl, supabaseKey)
    }

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        
        if (!supabase) {
            alert('Supabase 설정이 아직 완료되지 않았어! 코드 하단의 URL과 KEY를 먼저 입력해 줘.')
            return
        }
        
        const nickname = document.getElementById('nickname').value
        const username = document.getElementById('username').value
        const password = document.getElementById('password').value
        const passwordCheck = document.getElementById('password-check').value
        const email = document.getElementById('email').value

        if (password !== passwordCheck) {
            alert('입력하신 비밀번호가 서로 일치하지 않아! 다시 확인해 줄래?')
            return
        }

        try {
            const { data, error } = await supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        nickname: nickname,
                        user_id: username
                    }
                }
            })

            if (error) {
                alert('회원가입에 실패했어요: ' + error.message)
            } else {
                alert('회원가입 요청 성공! 메일함을 확인해서 인증을 완료해 주세요.')
                location.href = 'login.html'
            }
        } catch (err) {
            alert('네트워크 연결이나 Supabase 설정 정보를 다시 확인해 줘!')
        }
    })
</script>

<script>
    function toggleDropdown(event) {
        event.preventDefault();
        document.getElementById("my-dropdown").classList.toggle("show");
    }

    window.onclick = function(event) {
        if (!event.target.matches('.nav-link') && !event.target.closest('#my-menu-btn')) {
            const dropdowns = document.getElementsByClassName("dropdown-menu");
            for (let i = 0; i < dropdowns.length; i++) {
                let openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    }
    
    const policyData = {
        terms: {
            title: "이용약관",
            content: "제1조 (목적)\n본 약관은 'Look_Up'(이하 '회사')이 제공하는 날씨 기반 코디 추천 서비스의 이용과 관련하여 회사와 회원 간의 권리, 의무 및 책임사항을 규정함을 목적으로 합니다."
        },
        privacy: {
            title: "개인정보 처리방침",
            content: "제1조 (수집하는 개인정보의 항목)\n회사는 원활한 서비스 제공을 위해 회원가입 시 아이디, 비밀번호, 닉네임을 수집합니다."
        }
    };

    function openPolicyModal(type) {
        document.getElementById('policy-title').innerText = policyData[type].title;
        document.getElementById('policy-desc').innerText = policyData[type].content;
        document.getElementById('policy-modal').style.display = 'block';
    }

    function closePolicyModal() {
        document.getElementById('policy-modal').style.display = 'none';
    }
</script>
</body>
</html>
