<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맞춤 코디 추천 - Look_Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <a href="{{ url_for('home') }}" style="color: inherit; text-decoration: none;">Look_Up</a>
            </div>
            <ul>
                <li><a href="{{ url_for('guide_page') }}" class="nav-link"><i class="fas fa-book"></i> Guide</a></li>
                <li><a href="{{ url_for('codi_page') }}" class="nav-link"><i class="fas fa-tshirt"></i> Codi</a></li>
            </ul>
        </nav>
    </header>

    <main class="codi-page-container">
        <div class="codi-header">
            <h2>오늘 당신을 위한 맞춤 코디</h2>
        </div>

        <div class="codi-card">
            <div class="codi-img-box">
                <img src="{{ url_for('static', filename='images/cardigan.jpg') }}" alt="가디건"
                    onerror="this.src='https://via.placeholder.com/300x400?text=Look+Up'">
            </div>
        </div>
    </main>

</body>

</html>
