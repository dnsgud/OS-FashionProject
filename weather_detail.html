<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>날씨 상세 정보 - Codi Pick</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
    /* 상세 페이지 전용 추가 스타일 */
    .detail-container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
    .back-btn { display: inline-block; margin-bottom: 20px; color: #868e96; text-decoration: none; font-weight: 600; }
    
    /* 시간별 기온 섹션 */
    .hourly-section { background: #fff; border-radius: 32px; padding: 30px; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.03); }
    .hourly-list { display: flex; justify-content: space-between; overflow-x: auto; gap: 20px; padding-bottom: 10px; }
    .hourly-item { text-align: center; min-width: 60px; }
    .hourly-item .time { font-size: 13px; color: #adb5bd; margin-bottom: 10px; }
    .hourly-item i { font-size: 24px; margin-bottom: 10px; color: #4dabf7; }
    .hourly-item .h-temp { font-weight: 700; font-size: 18px; }

    /* 미세먼지 카드 */
    .dust-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .dust-card { background: #fff; border-radius: 28px; padding: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.03); display: flex; align-items: center; gap: 20px; }
    .dust-icon { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .fine-dust { background: #e7f5ff; color: #228be6; }
    .ultra-dust { background: #fff4e6; color: #fd7e14; }
</style>
</head>
<body>
    <div class="detail-container">
    </div>
</body>
</html>
