<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>날씨 상세 정보 - Codi Pick</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        /* 상세 페이지 전용 추가 스타일 */
        .detail-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #868e96;
            text-decoration: none;
            font-weight: 600;
        }

        /* 시간별 기온 섹션 */
        .hourly-section {
            background: #fff;
            border-radius: 32px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.03);
        }

        .hourly-list {
            display: flex;
            justify-content: space-between;
            overflow-x: auto;
            gap: 20px;
            padding-bottom: 10px;
        }

        .hourly-item {
            text-align: center;
            min-width: 60px;
        }

        .hourly-item .time {
            font-size: 13px;
            color: #adb5bd;
            margin-bottom: 10px;
        }

        .hourly-item i {
            font-size: 24px;
            margin-bottom: 10px;
            color: #4dabf7;
        }

        .hourly-item .h-temp {
            font-weight: 700;
            font-size: 18px;
        }

        /* 미세먼지 카드 */
        .dust-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .dust-card {
            background: #fff;
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.03);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .dust-icon {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .fine-dust {
            background: #e7f5ff;
            color: #228be6;
        }

        .ultra-dust {
            background: #fff4e6;
            color: #fd7e14;
        }
    </style>
</head>

<body>
    <div class="detail-container">
        <a href="{{ url_for('home') }}" class="back-btn"><i class="fas fa-chevron-left"></i> 메인으로 돌아가기</a>

        <header class="section-title" style="text-align: left; margin-bottom: 40px;">
            <h2 style="font-size: 32px;">오늘의 날씨 리포트</h2>
            <p style="color: #868e96; margin-top: 10px;">
                <span id="current-date" style="font-weight: 700; color: #495057;"></span>
                | 청주시 - 기준 실시간 데이터
            </p>
        </header>
        <section class="hourly-section">
            <h4 style="margin-bottom: 20px; font-weight: 800;">시간별 기온</h4>
            <div class="hourly-list">
                <div class="hourly-item">
                    <p class="time">오후 3시</p>
                    <i class="fas fa-sun"></i>
                    <p class="h-temp">30°</p>
                </div>
                <div class="hourly-item">
                    <p class="time">오후 6시</p>
                    <i class="fas fa-cloud-sun"></i>
                    <p class="h-temp">25°</p>
                </div>
                <div class="hourly-item">
                    <p class="time">오후 9시</p>
                    <i class="fas fa-cloud"></i>
                    <p class="h-temp">20°</p>
                </div>
                <div class="hourly-item">
                    <p class="time">오전 12시</p>
                    <i class="fas fa-moon"></i>
                    <p class="h-temp">15°</p>
                </div>
            </div>
        </section>

        <div class="dust-grid">
            <div class="dust-card">
                <div class="dust-icon fine-dust">
                    <i class="fas fa-mask"></i>
                </div>
                <div class="dust-info">
                    <span class="label">미세먼지</span>
                    <strong>좋음 (-㎍/㎥)</strong>
                </div>
            </div>
            <div class="dust-card">
                <div class="dust-icon ultra-dust">
                    <i class="fas fa-wind"></i>
                </div>
                <div class="dust-info">
                    <span class="label">초미세먼지</span>
                    <strong>보통 (-㎍/㎥)</strong>
                </div>
            </div>
        </div>
    </div>
    <script>
        function displayCurrentDate() {
            const now = new Date(); // 현재 시간 정보 가져오기

            // 날짜 형식 설정 (연, 월, 일, 요일)
            const options = {
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            };

            // 한국어 설정으로 날짜 변환
            const dateString = now.toLocaleDateString('ko-KR', options);

            // HTML의 해당 위치에 글자 넣기
            document.getElementById('current-date').innerText = dateString;
        }
        window.onload = () => {
            displayCurrentDate();
        };
    </script>
</body>

</html>
