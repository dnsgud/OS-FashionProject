<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>옷 등록하기 - Look_Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        .add-clothes-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .page-title {
            text-align: center;
            font-size: 2.2rem;
            color: #0f172a;
            margin-bottom: 40px;
            font-weight: 800;
        }

        .upload-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            border: 1px solid #e2e8f0;
        }

        /* 📸 질문해주신 이미지 섹션 전용 스타일 구성 유지 */
        .image-section {
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            background: #f8fafc;
            margin-bottom: 30px;
            position: relative;
            transition: all 0.3s ease;
        }

        .image-section:hover {
            border-color: #4f46e5;
            background: #f0f2ff;
        }

        .image-section i {
            font-size: 2.5rem;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        #preview-img {
            max-width: 100%;
            max-height: 250px;
            border-radius: 12px;
            display: none;
            object-fit: cover;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <a href="{{ url_for('home') }}" style="color: inherit; text-decoration: none;">Look_Up</a>
            </div>
            <ul>
                <li><a href="{{ url_for('guide_page') }}" class="nav-link"
                        style="color: inherit; text-decoration: none;"><i class="fas fa-book"></i> Guide</a></li>
                <li><a href="{{ url_for('codi_page') }}" class="nav-link"
                        style="color: inherit; text-decoration: none;"><i class="fas fa-tshirt"></i> Codi</a></li>
                <li class="dropdown-wrapper">
                    <a href="#" class="nav-link" id="my-menu-btn" style="color: inherit; text-decoration: none;"
                        onclick="toggleDropdown(event)"><i class="fas fa-user"></i> My</a>
                    <div class="dropdown-menu" id="my-dropdown">
                        <a href="{{ url_for('my_closet') }}">👗 내 옷장</a>
                        <a href="{{ url_for('my_scrap') }}">🔖 스크랩북</a>
                        <a href="{{ url_for('my_profile') }}">⚙️ 스타일 설정</a>
                    </div>
                </li>
                <li>
                    {% if logged_in %}
                    <a href="{{ url_for('logout') }}" class="login-btn"
                        style="background-color: #ef4444; text-decoration: none; display: inline-block;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                    {% else %}
                    <a href="{{ url_for('login') }}" class="login-btn"
                        style="text-decoration: none; display: inline-block;">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </a>
                    {% endif %}
                </li>
            </ul>
        </nav>
    </header>

    <main class="add-clothes-container">
        <h2 class="page-title">내 옷장에 추가하기</h2>

        <form class="upload-card" action="{{ url_for('add_clothes') }}" method="POST">

            <div class="image-section" onclick="document.getElementById('file-input').click()">
                <div id="upload-placeholder" style="text-align: center;">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p style="font-weight: 600; color: #475569; margin: 5px 0 0 0;">클릭해서 사진 선택하기</p>
                </div>
                <img id="preview-img" alt="옷 미리보기">
                <input type="file" id="file-input" accept="image/*" style="display: none;"
                    onchange="previewImage(event)">
            </div>

            <div style="margin-bottom: 25px;">
                <label style="font-weight: 700; color: #334155; display: block; margin-bottom: 10px;">옷 이름</label>
                <input type="text" id="cloth-name" name="name" placeholder="예: 무지 흰색 반팔티, 스트라이프 셔츠" required
                    style="width:100%; padding:16px; border:1px solid #e2e8f0; border-radius:14px; box-sizing:border-box; font-size:1rem; background:#f8fafc;">
            </div>

            <div style="display: flex; gap: 20px; margin-bottom: 25px;">
                <div style="flex: 1;">
                    <label style="font-weight: 700; color: #334155; display: block; margin-bottom: 10px;">대분류</label>
                    <select id="main-category" name="main_category" onchange="updateSubCategories()"
                        style="width:100%; padding:16px; border:1px solid #e2e8f0; border-radius:14px; font-size:1rem;">
                        <option value="">대분류 선택</option>
                        <option value="상의">상의</option>
                        <option value="하의">하의</option>
                        <option value="아우터">아우터</option>
                        <option value="신발">신발</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="font-weight: 700; color: #334155; display: block; margin-bottom: 10px;">소분류</label>
                    <select id="sub-category" name="sub_category"
                        style="width:100%; padding:16px; border:1px solid #e2e8f0; border-radius:14px; font-size:1rem;">
                        <option>먼저 대분류를 선택해 줘!</option>
                    </select>
                </div>
            </div>

            <div style="margin-bottom: 35px;">
                <label style="font-weight: 700; color: #334155; display: block; margin-bottom: 10px;">대표 색상</label>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <input type="color" id="cloth-color"
                        style="width: 60px; height: 50px; border: none; border-radius: 10px; cursor: pointer; padding: 0;"
                        oninput="updateColorText()">
                    <input type="text" id="cloth-color-text" name="color" value="#000000" readonly
                        style="width:120px; padding:14px; border:1px solid #e2e8f0; border-radius:12px; text-align:center; font-weight:600;">
                </div>
            </div>

            <button type="button" onclick="openSaveModal()"
                style="width:100%; padding:18px; background:#4f46e5; color:white; border:none; border-radius:16px; font-size:1.1rem; font-weight:700; cursor:pointer;">
                등록 완료하기
            </button>

            <div id="saveConfirmModal" class="modal-overlay"
                style="display: none; align-items: center; justify-content: center;">
                <div class="modal-content" style="max-width: 400px; padding: 30px; text-align: center;">
                    <i class="fas fa-check-circle" style="font-size: 3.5rem; color: #10b981; margin-bottom: 15px;"></i>
                    <h3 style="font-size: 1.4rem; margin-bottom: 10px;">옷을 등록할까요?</h3>
                    <p style="color: #64748b; margin-bottom: 25px;">입력하신 옷 정보가 옷장에 안전하게 보관됩니다.</p>
                    <div style="display: flex; gap: 12px;">
                        <button type="button" onclick="closeSaveModal()"
                            style="flex:1; padding:14px; background:#f1f5f9; color:#475569; border:none; border-radius:12px; font-weight:600; cursor:pointer;">취소</button>
                        <button type="submit"
                            style="flex:1; padding:14px; background:#4f46e5; color:white; border:none; border-radius:12px; font-weight:600; cursor:pointer;">확인</button>
                    </div>
                </div>
            </div>
        </form>
    </main>

    <script>
        const subCategoryData = {
            "상의": ["반팔 티셔츠", "긴팔 티셔츠", "셔츠/블라우스", "맨투맨/후드", "니트/스웨터"],
            "하의": ["데님", "슬랙스", "트레이닝/조거", "치마", "반바지"],
            "아우터": ["코트", "자켓", "패딩", "가디건", "바람막이"],
            "신발": ["스니커즈", "구두", "부츠", "샌들/슬리퍼"]
        };

        function updateSubCategories() {
            const mainCat = document.getElementById('main-category').value;
            const subCatSelect = document.getElementById('sub-category');
            subCatSelect.innerHTML = "";

            if (subCategoryData[mainCat]) {
                subCategoryData[mainCat].forEach(item => {
                    const option = document.createElement('option');
                    option.value = item; option.text = item;
                    subCatSelect.appendChild(option);
                });
            } else {
                subCatSelect.innerHTML = "<option>먼저 대분류를 선택해 줘!</option>";
            }
        }

        // [✨ 추가] 선택한 이미지를 즉시 미리보기 해주는 클라이언트 스크립트 기능 보존
        function previewImage(event) {
            const input = event.target;
            const previewImg = document.getElementById('preview-img');
            const placeholder = document.getElementById('upload-placeholder');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateColorText() {
            document.getElementById('cloth-color-text').value = document.getElementById('cloth-color').value;
        }
        function openSaveModal() {
            if (!document.getElementById('cloth-name').value || !document.getElementById('main-category').value) {
                alert("이름과 옷 종류는 꼭 선택해 줘!"); return;
            }
            document.getElementById('saveConfirmModal').style.display = 'flex';
        }
        function closeSaveModal() { document.getElementById('saveConfirmModal').style.display = 'none'; }
        function toggleDropdown(event) { event.preventDefault(); document.getElementById("my-dropdown").classList.toggle("show"); }
    </script>
</body>

</html>
