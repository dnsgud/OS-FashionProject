<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Look_Up - 내 프로필</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #f6f8fa;
            color: #24292f;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            display: flex;
            gap: 30px;
            padding: 0 20px;
        }

        /* 왼쪽 메뉴 */
        .sidebar {
            width: 250px;
            background: white;
            border: 1px solid #d0d7de;
            border-radius: 10px;
            padding: 20px;
            height: fit-content;
        }

        .profile-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 10px;
            border: none;
            background: white;
            text-align: left;
            cursor: pointer;
            border-radius: 6px;
            font-size: 15px;
            transition: 0.2s;
            text-decoration: none;
        }

        .menu-btn:hover {
            background: #f3f4f6;
        }

        .menu-btn.active {
            background: #0969da;
            color: white;
        }

        /* 오른쪽 콘텐츠 영역 */
        .content {
            flex: 1;
            background: white;
            border: 1px solid #d0d7de;
            border-radius: 10px;
            padding: 40px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .section-title {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            border-bottom: 1px solid #d0d7de;
            padding-bottom: 15px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #d0d7de;
            border-radius: 6px;
            font-size: 15px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        .row input {
            flex: 1;
        }

        .check-btn {
            width: 120px;
            border: none;
            border-radius: 6px;
            background: #238636;
            color: white;
            cursor: pointer;
        }

        .save-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            background: #0969da;
            color: white;
            cursor: pointer;
            font-size: 15px;
        }

        .info-box {
            margin-top: 20px;
            padding: 15px;
            background: #f6f8fa;
            border-radius: 8px;
            border: 1px solid #d0d7de;
        }

        .description {
            color: #57606a;
            font-size: 14px;
            margin-top: 5px;
        }

        /* 단계별 화면 전환용 스타일 (회원정보 수정에서 사용) */
        .step-container {
            display: none;
        }

        .step-container.active {
            display: block;
        }

        /* 다크모드 대응 통합 가드 스타일 */
        body.dark-mode {
            background-color: #0f172a;
            color: #f8fafc;
        }

        body.dark-mode .sidebar,
        body.dark-mode .content,
        body.dark-mode .info-box {
            background: #1e293b;
            border-color: #334155;
            color: #f8fafc;
        }

        body.dark-mode .menu-btn {
            background: #1e293b;
            color: #cbd5e1;
        }

        body.dark-mode .menu-btn:hover {
            background: #334155;
        }

        body.dark-mode .menu-btn.active {
            background: #6366f1;
            color: white;
        }

        body.dark-mode input,
        body.dark-mode select {
            background: #0f172a;
            border-color: #334155;
            color: #f8fafc;
        }

        body.dark-mode .section-title {
            border-color: #334155;
        }
    </style>
</head>

<body>

    <script>
        // 전역 다크모드 테마 상태 가드 적용
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <div class="container">

        <div class="sidebar">

            <div class="profile-title">
                👤 내 프로필
            </div>

            <button class="menu-btn active" onclick="showTab('profile', this)">
                회원정보 수정
            </button>

            <button class="menu-btn" onclick="showTab('password', this)">
                비밀번호 변경
            </button>

            <button class="menu-btn" onclick="showTab('body', this)">
                체형정보 수정
            </button>

            <hr style="border: 0; height: 1px; background: #d0d7de; margin: 15px 0;">

            <a href="{{ url_for('home_page') }}" class="menu-btn"
                style="color: #57606a; display: inline-block; text-decoration: none; width: 100%;">
                🏠 홈으로 가기
            </a>

        </div>

        <div class="content">

            <div id="profile" class="tab-content active">

                <div class="section-title">
                    회원정보 수정
                </div>

                <div id="infoStep1" class="step-container active">
                    <div class="form-group">
                        <label>안전을 위해 현재 비밀번호를 입력해주세요.</label>
                        <input type="password" id="infoCurrentPw" placeholder="현재 비밀번호 입력">
                    </div>
                    <button class="save-btn" onclick="verifyInfoPassword()">
                        확인
                    </button>
                </div>

                <div id="infoStep2" class="step-container">
                    <div class="form-group">
                        <label>닉네임</label>
                        <div class="row">
                            <input type="text" id="userNickname" value="Cross1406">
                            <button class="check-btn">중복확인</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>이메일</label>
                        <div class="row">
                            <input type="email" id="userEmail" value="cross@test.com">
                            <button class="check-btn">중복확인</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>이름</label>
                        <input type="text" id="userName" value="홍길동">
                    </div>

                    <button class="save-btn">
                        수정하기
                    </button>
                </div>

            </div>

            <div id="password" class="tab-content">

                <div class="section-title">
                    비밀번호 변경
                </div>

                <div class="form-group">
                    <label>기존 비밀번호</label>
                    <input type="password" id="pwCurrentPw" placeholder="기존 비밀번호를 입력하세요">
                </div>

                <div class="form-group">
                    <label>새 비밀번호</label>
                    <input type="password" id="newPw" placeholder="새 비밀번호를 입력하세요 (6자 이상)">
                </div>

                <div class="form-group">
                    <label>새 비밀번호 확인</label>
                    <input type="password" id="confirmPw" placeholder="새 비밀번호를 한번 더 입력하세요">
                </div>

                <button class="save-btn" onclick="changePassword()">
                    비밀번호 변경 완료
                </button>

            </div>

            <div id="body" class="tab-content">

                <div class="section-title">
                    체형정보 수정
                </div>

                <div class="form-group">
                    <label>키(cm)</label>
                    <input type="number" id="bodyHeight" value="175">
                </div>

                <div class="form-group">
                    <label>몸무게(kg)</label>
                    <input type="number" id="bodyWeight" value="70">
                </div>

                <div class="form-group">
                    <label>체형</label>
                    <select id="bodyType" onchange="updateDescription()">
                        <option value="reverse">역삼각형</option>
                        <option value="triangle">삼각형</option>
                        <option value="straight">일자형</option>
                    </select>
                </div>

                <div class="info-box" id="bodyDescription">
                    넓은 어깨와 좁은 허리를 가진 체형입니다.
                </div>

                <br>

                <button class="save-btn">
                    저장하기
                </button>

            </div>

        </div>

    </div>

    <script>
        // 가상 DB 비밀번호 데이터 (추후 API 가동 시 백엔드 검증 시스템으로 이전 가능)
        const savedPassword = "1234";

        function showTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.sidebar .menu-btn').forEach(button => button.classList.remove('active'));

            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');

            // 다른 탭으로 이동 시 입력값 및 인증 스텝 초기화 가드
            resetAllTabs();
        }

        // 회원정보 수정용 - 현재 비밀번호 확인 함수
        function verifyInfoPassword() {
            const inputPw = document.getElementById('infoCurrentPw').value;

            if (inputPw !== savedPassword) {
                alert("현재 비밀번호가 올바르지 않습니다.");
                return;
            }

            document.getElementById('infoStep1').classList.remove('active');
            document.getElementById('infoStep2').classList.add('active');
        }

        // 모든 탭의 입력 폼과 단계를 초기 상태로 되돌리는 함수
        function resetAllTabs() {
            const infoPw = document.getElementById('infoCurrentPw');
            const curPw = document.getElementById('pwCurrentPw');
            const nPw = document.getElementById('newPw');
            const cPw = document.getElementById('confirmPw');

            if (infoPw) infoPw.value = "";
            if (curPw) curPw.value = "";
            if (nPw) nPw.value = "";
            if (cPw) cPw.value = "";

            // 회원정보 수정 단계를 다시 1단계(비밀번호 검증)로 원복
            const step1 = document.getElementById('infoStep1');
            const step2 = document.getElementById('infoStep2');
            if (step1 && step2) {
                step1.classList.add('active');
                step2.classList.remove('active');
            }
        }

        function updateDescription() {
            const value = document.getElementById('bodyType').value;
            const box = document.getElementById('bodyDescription');

            if (value === 'reverse') {
                box.innerHTML = '넓은 어깨와 좁은 허리를 가진 체형입니다.';
            } else if (value === 'triangle') {
                box.innerHTML = '하체 비율이 상대적으로 큰 체형입니다.';
            } else {
                box.innerHTML = '상체와 하체 비율이 비슷한 체형입니다.';
            }
        }

        // my_profile.html 내의 changePassword 함수 수정
        async function changePassword() {
            const login_id = localStorage.getItem('login_id'); // 저장된 아이디 가져오기
            const currentPw = document.getElementById('pwCurrentPw').value;
            const newPw = document.getElementById('newPw').value;
            const confirmPw = document.getElementById('confirmPw').value;

            if (!login_id) {
                alert("로그인 정보가 없습니다.");
                return;
            }

            try {
                const response = await fetch('/api/update_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    // 서버의 change_profile_password 인자에 맞춰 login_id 추가
                    body: JSON.stringify({ login_id, currentPw, newPw, confirmPw })
                });

                const result = await response.json();
                if (result.status) {
                    alert("비밀번호 변경 완료!");
                    location.reload();
                } else {
                    alert(result.message || "비밀번호 변경에 실패했습니다.");
                }
            } catch (error) {
                alert("서버 연결 중 오류가 발생했습니다.");
            }
        }
    </script>

</body>

</html>
