<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Look_Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #1e293b;
            --bg: #f1f5f9;
            --text: #0f172a;
            --border: #e2e8f0;
            --brand-color: #4f46e5;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 카드 디자인 */
        .login-card {
            background: white;
            padding: 40px 30px;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* 입력 폼 */
        .form-input {
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 0.95rem;
            box-sizing: border-box;
            background: #f8fafc;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: var(--brand-color);
            color: white;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #4338ca;
        }

        /* 체크박스 및 링크 정렬 */
        .options-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 20px 0;
            font-size: 0.85rem;
            color: #64748b;
        }

        .keep-login {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .find-links a {
            color: #64748b;
            text-decoration: none;
            margin-left: 5px;
        }

        /* 구분선 및 회원가입 */
        .signup-section {
            margin-top: 30px;
            border-top: 1px solid var(--border);
            padding-top: 25px;
            font-size: 0.9rem;
            color: #64748b;
        }

        .signup-link {
            font-weight: 700;
            color: var(--text);
            text-decoration: none;
            margin-left: 5px;
        }

        /* 모달 스타일 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.3);
            backdrop-filter: blur(4px);
            z-index: 9999;
        }

        .modal-card {
            background: white;
            padding: 35px 30px;
            border-radius: 28px;
            width: 90%;
            max-width: 400px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: left;
        }

        .modal-control {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

        .modal-submit-btn {
            width: 100%;
            padding: 15px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="logo"><a href="{{ url_for('home') }}" style="color: inherit; text-decoration: none;">Look_Up</a>
        </div>

        <form onsubmit="submitLogin(event)">
            <input type="text" id="login-id" class="form-input" placeholder="아이디" required>
            <input type="password" id="login-password" class="form-input" placeholder="비밀번호" required>

            <div id="error-box" class="error-message">
                <span id="error-msg"></span>
            </div>

            <div class="options-container">
                <label class="keep-login"><input type="checkbox"> 로그인 상태 유지</label>
                <div>
                    <a href="#" onclick="event.preventDefault(); openModal('pw-modal')">아이디/비밀번호 찾기</a>
                </div>
            </div>
            <button type="submit" class="login-btn">로그인</button>
        </form>

        <div class="signup-section">
            아직 회원이 아니신가요?<a href="{{ url_for('register_page') }}" class="signup-link">회원가입</a>
        </div>
    </div>

    <div id="pw-modal" class="modal-overlay">
        <div class="modal-card">
            <h3>비밀번호 찾기</h3>

            <div id="pw-step-verify" class="modal-step" style="display:block;">
                <input type="text" id="find-pw-name" class="modal-control" placeholder="이름">
                <input type="text" id="find-pw-id" class="modal-control" placeholder="아이디">
                <input type="email" id="find-pw-email" class="modal-control" placeholder="이메일">
                <button class="modal-submit-btn" onclick="sendPwVerifyCode()">인증번호 발송</button>
                <input type="text" id="find-pw-code" class="modal-control" placeholder="인증번호">
                <button class="modal-submit-btn" onclick="verifyPwCode()">본인 확인 완료</button>
            </div>

            <div id="pw-step-reset" class="modal-step">
                <input type="password" id="new-pw" class="modal-control" placeholder="새 비밀번호">
                <input type="password" id="new-pw-confirm" class="modal-control" placeholder="비밀번호 확인">
                <button class="modal-submit-btn" onclick="submitResetPw()">비밀번호 변경</button>
            </div>
        </div>
    </div>

    <script>
        // 1. 로그인 요청
        async function submitLogin(event) {
            event.preventDefault();
            const login_id = document.getElementById('login-id').value;
            const password = document.getElementById('login-password').value;
            const errorBox = document.getElementById('error-box');
            const errorMsg = document.getElementById('error-msg');

            try {
                const res = await fetch("{{ url_for('login') }}", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ login_id: login_id, password: password })
                });

                if (res.ok) {
                    location.href = "{{ url_for('home_page') }}";
                } else {
                    const errData = await res.json();
                    errorMsg.innerText = "❌ " + (errData.error || "아이디 또는 비밀번호가 틀렸습니다.");
                    errorBox.style.display = "block";
                }
            } catch (e) {
                errorMsg.innerText = "❌ 서버와 연결할 수 없습니다.";
                errorBox.style.display = "block";
            }
        }

        // 2. 모달 제어
        function openModal(id) { document.getElementById(id).style.display = 'block'; }

        function verifyPwCode() {
            alert('인증되었습니다.');
            document.getElementById('pw-step-verify').style.display = 'none';
            document.getElementById('pw-step-reset').style.display = 'block';
        }

        function submitResetPw() {
            const newPw = document.getElementById('new-pw').value;
            if (newPw !== document.getElementById('new-pw-confirm').value) {
                alert('비밀번호가 일치하지 않습니다.');
                return;
            }
            alert('비밀번호가 변경되었습니다.');
            location.reload();
        }
    </script>
</body>

</html>
