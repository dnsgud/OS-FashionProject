<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>메인 홈</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
        }

        .navbar {
            background-color: #1a73e8;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .welcome-msg {
            font-size: 24px;
            color: #333;
            margin-bottom: 20px;
        }

        .user-email {
            color: #1a73e8;
            font-weight: bold;
        }

        .content-area {
            border: 2px dashed #ccc;
            padding: 40px;
            margin-top: 30px;
            color: #888;
            border-radius: 8px;
        }

        .logout-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background-color: #c82333;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo"><strong>현비나이</strong></div>
        <button class="logout-btn" onclick="handleLogout()">로그아웃</button>
    </nav>

    <div class="container">
        <div class="welcome-msg">
            안녕하세요, <span class="user-email">{{ user }}</span>님!
        </div>
        <p>인증에 성공하셨습니다. 로그인된 상태입니다.</p>
    </div>

    <script>
        async function handleLogout() {
            if (!confirm("로그아웃 하시겠습니까?")) return;

            const response = await fetch('/api/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            if (response.ok) {
                alert("로그아웃 되었습니다.");
                window.location.href = "/"; // 다시 로그인 화면으로 이동
            } else {
                alert("로그아웃 처리 중 오류가 발생했습니다.");
            }
        }
    </script>
</body>

</html>
