<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 옷장 - Look_Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        .closet-page-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .closet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 20px;
        }

        .closet-header h2 {
            font-size: 2rem;
            color: #0f172a;
            font-weight: 800;
            margin: 0;
        }

        .category-section {
            margin-bottom: 40px;
        }

        .category-title {
            font-size: 1.3rem;
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .closet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
        }

        .closet-item {
            background: #fff;
            border-radius: 20px;
            padding: 15px;
            border: 1px solid #e2e8f0;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
        }

        .closet-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            border-color: #4f46e5;
        }

        .closet-item img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 14px;
            margin-bottom: 12px;
            background: #f8fafc;
        }

        .item-label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #334155;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <a href="{{ url_for('home') }}" style="color: inherit; text-decoration: none;">Look_Up</a>
            </div>
            <ul>
                <li>
                    <a href="{{ url_for('guide_page') }}" class="nav-link"
                        style="color: inherit; text-decoration: none;">
                        <i class="fas fa-book"></i> Guide
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('codi_page') }}" class="nav-link"
                        style="color: inherit; text-decoration: none;">
                        <i class="fas fa-tshirt"></i> Codi
                    </a>
                </li>
                <li class="dropdown-wrapper">
                    <a href="#" class="nav-link" id="my-menu-btn" style="color: inherit; text-decoration: none;"
                        onclick="toggleDropdown(event)">
                        <i class="fas fa-user"></i> My
                    </a>
                    <div class="dropdown-menu" id="my-dropdown">
                        <a href="{{ url_for('my_closet') }}">👗 내 옷장</a>
                        <a href="{{ url_for('my_scrap') }}">🔖 스크랩북</a>
                        <a href="{{ url_for('my_profile') }}">⚙️ 스타일 설정</a>
                    </div>
                </li>
                <li>
                    {% if logged_in %}
                    <a href="{{ url_for('logout') }}" class="login-btn"
                        style="background-color: #ef4444; text-decoration: none; display: inline-block;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                    {% else %}
                    <a href="{{ url_for('login') }}" class="login-btn"
                        style="text-decoration: none; display: inline-block;">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </a>
                    {% endif %}
                </li>
            </ul>
        </nav>
    </header>

    <main class="closet-page-container">
        <div class="closet-header">
            <h2>내 옷장</h2>
        </div>

        <section class="category-section">
            <div class="category-title"><i class="fas fa-coat"></i> 아우터</div>
            <div class="closet-grid">
                <a href="{{ url_for('add_clothes') }}" class="closet-item">
                    <img src="{{ url_for('static', filename='images/leather_jacket.jpg') }}" alt="옷"
                        onerror="this.src='https://via.placeholder.com/140?text=Outer'">
                    <div class="item-label">레더 자킷</div>
                </a>
                <a href="{{ url_for('add_clothes') }}" class="closet-item">
                    <img src="{{ url_for('static', filename='images/cardigan.jpg') }}" alt="옷"
                        onerror="this.src='https://via.placeholder.com/140?text=Outer'">
                    <div class="item-label">검정 가디건</div>
                </a>
            </div>
        </section>

        <section class="category-section">
            <div class="category-title"><i class="fas fa-shirt"></i> 상의</div>
            <div class="closet-grid">
                <a href="{{ url_for('add_clothes') }}" class="closet-item">
                    <img src="{{ url_for('static', filename='images/white_tshirt.jpg') }}" alt="옷"
                        onerror="this.src='https://via.placeholder.com/140?text=Top'">
                    <div class="item-label">흰색 반팔티</div>
                </a>
                <a href="{{ url_for('add_clothes') }}" class="closet-item">
                    <img src="{{ url_for('static', filename='images/striped_shirt.jpg') }}" alt="옷"
                        onerror="this.src='https://via.placeholder.com/140?text=Top'">
                    <div class="item-label">스트라이프 셔츠</div>
                </a>
            </div>
        </section>

        <section class="category-section">
            <div class="category-title"><i class="fas fa-socks"></i> 하의</div>
            <div class="closet-grid">
                <a href="{{ url_for('add_clothes') }}" class="closet-item">
                    <img src="{{ url_for('static', filename='images/jeans.jpg') }}" alt="옷"
                        onerror="this.src='https://via.placeholder.com/140?text=Bottom'">
                    <div class="item-label">연청바지</div>
                </a>
                <a href="{{ url_for('add_clothes') }}" class="closet-item">
                    <img src="{{ url_for('static', filename='images/slacks.jpg') }}" alt="옷"
                        onerror="this.src='https://via.placeholder.com/140?text=Bottom'">
                    <div class="item-label">검정 슬랙스</div>
                </a>
            </div>
        </section>

        <section class="category-section">
            <div class="category-title"><i class="fas fa-shoe-prints"></i> 신발</div>
            <div class="closet-grid">
                <a href="{{ url_for('add_clothes') }}" class="closet-item">
                    <img src="{{ url_for('static', filename='images/sneakers.jpg') }}" alt="옷"
                        onerror="this.src='https://via.placeholder.com/140?text=Shoes'">
                    <div class="item-label">화이트 스니커즈</div>
                </a>
                <a href="{{ url_for('add_clothes') }}" class="closet-item">
                    <img src="{{ url_for('static', filename='images/rainboots.jpg') }}" alt="옷"
                        onerror="this.src='https://via.placeholder.com/140?text=Shoes'">
                    <div class="item-label">레인부츠</div>
                </a>
                <a href="{{ url_for('add_clothes') }}" class="closet-item">
                    <img src="{{ url_for('static', filename='images/ugg.jpg') }}" alt="옷"
                        onerror="this.src='https://via.placeholder.com/140?text=Shoes'">
                    <div class="item-label">어그부츠</div>
                </a>
            </div>
        </section>
    </main>

    <div class="fab-container"
        style="position: fixed !important; bottom: 40px !important; right: 40px !important; z-index: 99999 !important;">
        <div class="fab-menu" id="fab-menu">
            <a href="{{ url_for('add_clothes_photo') }}" class="fab-item">📸 사진으로 등록</a>
            <a href="{{ url_for('add_clothes') }}" class="fab-item">✏️ 직접 등록</a>
        </div>
        <button class="fab-button" onclick="toggleFab(event)" title="옷 등록하기"
            style="width: 60px; height: 60px; background: #4f46e5; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(79, 70, 229, 0.4);">
            <i class="fas fa-plus" id="fab-icon"></i>
        </button>
    </div>

    <script>
        function toggleDropdown(event) {
            event.preventDefault();
            document.getElementById("my-dropdown").classList.toggle("show");
        }

        // [💡 추가] 플러스 버튼 클릭 시 두 개의 메뉴를 열고 닫아주는 핵심 자바스크립트 함수 이식
        function toggleFab(event) {
            event.preventDefault();
            const menu = document.getElementById('fab-menu');
            const btn = document.querySelector('.fab-button');
            menu.classList.toggle('show');
            btn.classList.toggle('active');
        }

        window.onclick = function (event) {
            if (!event.target.matches('.nav-link') && !event.target.closest('#my-menu-btn')) {
                const dropdowns = document.getElementsByClassName("dropdown-menu");
                for (let i = 0; i < dropdowns.length; i++) {
                    let openDropdown = dropdowns[i];
                    if (openDropdown.classList.contains('show')) {
                        openDropdown.classList.remove('show');
                    }
                }
            }
            // 바깥 영역 클릭 시 펼쳐진 플러스 버튼 메뉴를 다시 숨겨주는 센스 코드
            if (!event.target.closest('.fab-container')) {
                const fabMenu = document.getElementById('fab-menu');
                const fabBtn = document.querySelector('.fab-button');
                if (fabMenu && fabMenu.classList.contains('show')) {
                    fabMenu.classList.remove('show');
                    fabBtn.classList.remove('active');
                }
            }
        }
    </script>
</body>

</html>
