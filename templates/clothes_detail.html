<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>옷 상세 정보 - Look_Up</title>
    <style>
        /* 기존 CSS 동일 */
    </style>
</head>

<body>
    <header>...</header>

    <main class="add-clothes-container">
        <h2 class="page-title" id="page-title">{{ "옷 상세 정보" if cloth else "내 옷장에 새 옷 추가하기" }}</h2>

        <div class="upload-card">
            <div class="image-section" onclick="document.getElementById('file-input').click()">

                <div id="upload-placeholder" style="text-align: center;">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>클릭해서 사진 선택하기</p>
                </div>
                <img id="preview-img" alt="옷 미리보기" style="display: none;">

                <input type="hidden" id="cloth-data-json" value='{{ cloth | tojson | safe if cloth else "" }}'>
            </div>

            <div class="form-section">
                <input type="hidden" id="cloth-id" value="{{ cloth.id if cloth else '' }}">

                <div class="form-group">
                    <label>이름</label>
                    <input type="text" id="cloth-name" value="{{ cloth.name if cloth else '' }}"
                        placeholder="예: 무신사 스탠다드 검정 슬랙스">
                </div>

                <div class="form-group">
                    <label>메인 카테고리</label>
                    <select id="main-category" onchange="updateSubCategoryAndFit()">
                        <option value="">대분류 선택</option>
                        <option value="top" {{ 'selected' if cloth and cloth.main_category=='top' }}>상의</option>
                        <option value="bottom" {{ 'selected' if cloth and cloth.main_category=='bottom' }}>하의</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>서브 카테고리</label>
                    <select id="sub-category">
                        <option value="{{ cloth.sub_category if cloth else '' }}">{{ cloth.sub_category if cloth else
                            '먼저 메인 카테고리를 선택하세요' }}</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>핏 선택</label>
                    <div class="fit-container" id="fit-container">
                    </div>
                </div>

                <div class="form-group">
                    <label>색상</label>
                    <div class="color-group">
                        <input type="color" id="cloth-color" value="{{ cloth.color if cloth else '#000000' }}"
                            onchange="updateColorText()">
                        <input type="text" id="cloth-color-text" value="{{ cloth.color if cloth else '#000000' }}"
                            readonly style="width: 120px; background: #f8fafc; text-align: center;">
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-main-save" onclick="openSaveModal()">저장</button>
                    {% if cloth %}
                    <button class="btn-main-delete" onclick="openDeleteModal()"><i
                            class="fas fa-trash-can"></i></button>
                    {% endif %}
                </div>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            // 1. 데이터를 안전하게 가져오기
            const jsonData = document.getElementById('cloth-data-json').value;
            const clothData = jsonData ? JSON.parse(jsonData) : null;

            if (clothData) {
                console.log("데이터 로드 성공:", clothData);

                // 이미지 처리
                document.getElementById('upload-placeholder').style.display = 'none';
                const preview = document.getElementById('preview-img');
                preview.src = clothData.image_url;
                preview.style.display = 'block';

                // 카테고리 설정
                document.getElementById('main-category').value = clothData.main_category;

                // 서브카테고리/핏 생성 함수 실행
                updateSubCategoryAndFit();

                // 데이터 매핑
                document.getElementById('sub-category').value = clothData.sub_category;

                // 핏 버튼 활성화
                setTimeout(() => {
                    const fitBtns = document.querySelectorAll('.fit-btn');
                    fitBtns.forEach(btn => {
                        if (btn.textContent === clothData.fit) btn.classList.add('selected');
                    });
                }, 50); // 핏 버튼이 생성된 후 실행되도록 약간의 지연
            }
            updateTempDescription();
        });
    </script>
</body>

</html>
