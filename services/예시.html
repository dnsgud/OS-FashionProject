<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>옷 등록하기 - Look_Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        .add-clothes-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .page-title {
            text-align: center;
            font-size: 2.2rem;
            color: #0f172a;
            margin-bottom: 40px;
            font-weight: 800;
        }

        .upload-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: grid;
            grid-template-columns: 1fr 1fr; 
            gap: 50px;
            border: 1px solid #f1f5f9;
            width: 100%;
            box-sizing: border-box;
        }

        .image-section {
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            width: 100%;
            aspect-ratio: 1 / 1;
            box-sizing: border-box;
        }

        .image-section:hover {
            border-color: #4f46e5;
            background: #e0e7ff;
        }

        .image-section i {
            font-size: 4rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .image-section p {
            color: #64748b;
            font-size: 1.1rem;
            font-weight: 600;
        }

        #preview-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .form-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            box-sizing: border-box;
            justify-content: center;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
        }

        .form-group label {
            font-weight: 600;
            color: #1e293b;
            font-size: 1.05rem;
        }

        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            box-sizing: border-box;
            padding: 16px 20px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: 'Pretendard', sans-serif;
        }

        .form-group input[type="text"]:focus,
        .form-group select:focus {
            border-color: #4f46e5;
        }

        .color-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .color-group input[type="color"] {
            width: 55px;
            height: 55px;
            padding: 0;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            overflow: hidden;
        }

        .color-group input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        .color-group input[type="color"]::-webkit-color-swatch {
            border: 2px solid #cbd5e1;
            border-radius: 50%;
        }

        .fit-container,
        .tpo-scroll-container {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding-bottom: 12px;
            scrollbar-width: none; 
            width: 100%;
            box-sizing: border-box;
        }
        .fit-container::-webkit-scrollbar,
        .tpo-scroll-container::-webkit-scrollbar {
            display: none;
        }

        .fit-btn,
        .tpo-tag {
            background: #f1f5f9;
            color: #64748b;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .fit-btn.selected,
        .tpo-tag.selected {
            background: #e0e7ff;
            color: #4f46e5;
            border-color: #4f46e5;
        }

        .info-text {
            color: #94a3b8;
            font-size: 1rem;
            font-weight: 500;
            padding: 12px 0;
        }

        /* 온도 레벨 그라데이션 커스텀 스타일 */
        .temp-level-wrapper {
            background: #f8fafc;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
        }

        .temp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .temp-display {
            font-size: 1.3rem;
            font-weight: 800;
            color: #4f46e5;
            background: #e0e7ff;
            padding: 4px 12px;
            border-radius: 8px;
        }

        /* 파란색에서 빨간색으로 이어지는 슬라이더 트랙 설정 */
        .temp-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            border-radius: 6px;
            background: linear-gradient(to right, #3b82f6, #60a5fa, #fbbf24, #f97316, #ef4444);
            outline: none;
            margin: 15px 0;
        }

        /* 크롬, 사파리 등 브라우저용 손잡이(Thumb) 디자인 조절 */
        .temp-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid #4f46e5;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .temp-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            background: #f1f5f9;
        }

        /* 파이어폭스 브라우저용 손잡이(Thumb) 디자인 조절 */
        .temp-slider::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ffffff;
            border: 3px solid #4f46e5;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .temp-slider::-moz-range-thumb:hover {
            transform: scale(1.2);
            background: #f1f5f9;
        }

        .temp-description {
            font-size: 0.95rem;
            color: #475569;
            line-height: 1.6;
            min-height: 48px;
            word-break: keep-all;
            border-top: 1px dashed #cbd5e1;
            padding-top: 12px;
            margin-top: 5px;
        }

        .button-group {
            display: flex;
            margin-top: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn-main-save {
            width: 100%;
            padding: 20px;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.2rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            box-sizing: border-box;
            background: #4f46e5;
            color: white;
        }

        .btn-main-save:hover {
            background: #4338ca;
        }

        .confirm-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }

        .confirm-modal-box {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            animation: popUp 0.3s ease;
        }

        .confirm-modal-box h3 {
            font-size: 1.4rem;
            color: #0f172a;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .modal-btn-group {
            display: flex;
            gap: 15px;
        }

        .m-btn {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .m-btn-cancel {
            background: #f1f5f9;
            color: #64748b;
        }
        
        .m-btn-cancel:hover {
            background: #e2e8f0;
        }

        .m-btn-confirm {
            background: #4f46e5;
            color: white;
        }

        .m-btn-confirm:hover {
            background: #4338ca;
        }

        @keyframes popUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 900px) {
            .upload-card {
                grid-template-columns: 1fr;
            }
            .image-section {
                aspect-ratio: auto;
                min-height: 400px;
            }
        }
    </style>
</head>
<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html" style="color: inherit; text-decoration: none;">Look_Up</a>
            </div>
            <ul>
                <li><a href="index.html" class="nav-link" style="color: inherit; text-decoration: none;"><i class="fas fa-home"></i> Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="add-clothes-container">
        <h2 class="page-title">내 옷장에 새 옷 추가하기</h2>
        
        <div class="upload-card">
            <div class="image-section" onclick="document.getElementById('file-input').click()">
                <div id="upload-placeholder" style="text-align: center;">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>클릭해서 사진 선택하기</p>
                </div>
                <img id="preview-img" alt="옷 미리보기">
                <input type="file" id="file-input" accept="image/*" style="display: none;" onchange="previewImage(event)">
            </div>

            <div class="form-section">
                
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" id="cloth-name" placeholder="예: 무신사 스탠다드 검정 슬랙스">
                </div>

                <div class="form-group">
                    <label>메인 카테고리</label>
                    <select id="main-category" onchange="updateSubCategoryAndFit()">
                        <option value="">대분류 선택</option>
                        <option value="top">상의</option>
                        <option value="bottom">하의</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>서브 카테고리</label>
                    <select id="sub-category">
                        <option value="">먼저 메인 카테고리를 선택하세요</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>핏 선택</label>
                    <div class="fit-container" id="fit-container">
                        <div class="info-text">먼저 메인 카테고리를 선택해 줘!</div>
                    </div>
                </div>

                <div class="form-group">
                    <label>색상</label>
                    <div class="color-group">
                        <input type="color" id="cloth-color" value="#000000" onchange="updateColorText()">
                        <input type="text" id="cloth-color-text" value="#000000" readonly style="width: 120px; background: #f8fafc; text-align: center;">
                    </div>
                </div>

                <div class="form-group">
                    <label>스타일</label>
                    <div class="tpo-scroll-container">
                        <span class="tpo-tag" onclick="toggleTag(this)">#캐주얼</span>
                        <span class="tpo-tag" onclick="toggleTag(this)">#데이트</span>
                        <span class="tpo-tag" onclick="toggleTag(this)">#비지니스</span>
                        <span class="tpo-tag" onclick="toggleTag(this)">#스트릿</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>체감 온도 레벨 설정</label>
                    <div class="temp-level-wrapper">
                        <div class="temp-header">
                            <span style="font-size: 0.95rem; color:#64748b; font-weight: 600;">내가 느끼는 옷의 두께감</span>
                            <span class="temp-display" id="temp-val-display">Lv.5</span>
                        </div>
                        <input type="range" id="temp-level" class="temp-slider" min="1" max="10" value="5" oninput="updateTempDescription()">
                        <div class="temp-description" id="temp-desc-display">
                            로딩 중...
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn-main-save" onclick="openSaveModal()">저장</button>
                </div>

            </div>
        </div>
    </main>

    <div id="saveConfirmModal" class="confirm-modal-overlay" onclick="if(event.target == this) closeSaveModal()">
        <div class="confirm-modal-box">
            <h3>저장하시겠습니까?</h3>
            <div class="modal-btn-group">
                <button class="m-btn m-btn-cancel" onclick="closeSaveModal()">취소</button>
                <button class="m-btn m-btn-confirm" onclick="executeSave()">확인</button>
            </div>
        </div>
    </div>

    <script>
        function previewImage(event) {
            const input = event.target;
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewImg = document.getElementById('preview-img');
                    const placeholder = document.getElementById('upload-placeholder');
                    
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    placeholder.style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        const subCategoryData = {
            top: ["이너", "아우터"],
            bottom: ["바지"],
        };

        const fitData = {
            top: ["슬림핏", "레귤러핏", "오버핏"],
            bottom: ["슬림핏", "레귤러핏", "와이드핏"]
        };

        const tempDescriptions = {
            1: "🥶 <b>[Lv.1 극한의 추위 / 4°C 이하]</b> 패딩, 두꺼운 코트, 목도리가 필수인 한겨울 날씨에 입는 옷이야.",
            2: "❄️ <b>[Lv.2 쌀쌀한 겨울 / 5°C ~ 8°C]</b> 코트, 가죽 자켓, 히트텍 등 겨울철 찬 바람을 막아줄 수 있는 옷이야.",
            3: "🧥 <b>[Lv.3 초겨울·늦가을 / 9°C ~ 11°C]</b> 자켓, 트렌치코트, 니트, 스타킹이 어울리는 서늘한 날씨용 옷이야.",
            4: "🍁 <b>[Lv.4 선선한 가을 / 12°C ~ 16°C]</b> 자켓, 가디건, 청자켓, 면바지 등 아침저녁으로 쌀쌀할 때 딱 좋은 옷이야.",
            5: "🌾 <b>[Lv.5 완연한 봄·가을 / 17°C ~ 19°C]</b> 얇은 니트, 맨투맨, 후드티, 청바지 등 단품으로 가볍게 입기 좋은 옷이야.",
            6: "🌤️ <b>[Lv.6 쾌적한 환절기 / 20°C ~ 22°C]</b> 긴팔티, 가벼운 셔츠, 슬랙스, 면바지 등 활동하기 가장 쾌적한 날씨의 옷이야.",
            7: "🍃 <b>[Lv.7 초여름 날씨 / 23°C ~ 26°C]</b> 반팔티, 얇은 셔츠, 반바지 등 살짝 더워지기 시작할 때 시원하게 입는 옷이야.",
            8: "☀️ <b>[Lv.8 한여름 무더위 / 27°C 이상]</b> 민소매, 반팔, 반바지, 린넨 소재 옷 등 가만히 있어도 땀이 나는 더운 날 입는 옷이야.",
            9: "🔥 <b>[Lv.9 폭염 주의 / 33°C 내외]</b> 매우 통기성이 좋은 기능성 의류나 가장 얇고 시원한 소재의 여름 전용 옷이야.",
            10: "🌋 <b>[Lv.10 극심한 폭염 / 35°C 이상]</b> 땀 흡수가 잘 되고 몸에 달라붙지 않는, 무더위를 버티기 위한 생존형 여름 옷이야."
        };

        function updateTempDescription() {
            const currentLevel = document.getElementById('temp-level').value;
            document.getElementById('temp-val-display').textContent = `Lv.${currentLevel}`;
            document.getElementById('temp-desc-display').innerHTML = tempDescriptions[currentLevel];
        }

        function updateSubCategoryAndFit() {
            const mainCat = document.getElementById('main-category').value;
            const subCatSelect = document.getElementById('sub-category');
            const fitContainer = document.getElementById('fit-container');
            
            subCatSelect.innerHTML = "";
            fitContainer.innerHTML = "";
            
            if (mainCat && subCategoryData[mainCat]) {
                subCategoryData[mainCat].forEach(item => {
                    const option = document.createElement('option');
                    option.value = item;
                    option.text = item;
                    subCatSelect.appendChild(option);
                });

                fitData[mainCat].forEach(fitName => {
                    const button = document.createElement('span');
                    button.className = 'fit-btn';
                    button.textContent = fitName;
                    button.onclick = function() { selectFitTag(this); };
                    fitContainer.appendChild(button);
                });
            } else {
                const option = document.createElement('option');
                option.text = "먼저 대분류를 선택해 줘!";
                subCatSelect.appendChild(option);

                const infoDiv = document.createElement('div');
                infoDiv.className = 'info-text';
                infoDiv.textContent = "먼저 메인 카테고리를 선택해 줘!";
                fitContainer.appendChild(infoDiv);
            }
        }

        function selectFitTag(element) {
            const fitButtons = document.querySelectorAll('.fit-btn');
            fitButtons.forEach(btn => btn.classList.remove('selected'));
            element.classList.add('selected');
        }

        function updateColorText() {
            const colorValue = document.getElementById('cloth-color').value;
            document.getElementById('cloth-color-text').value = colorValue;
        }

        function toggleTag(element) {
            element.classList.toggle('selected');
        }

        function openSaveModal() {
            const name = document.getElementById('cloth-name').value;
            const mainCat = document.getElementById('main-category').value;
            
            if(!name || !mainCat) {
                alert("이름과 옷 종류는 꼭 선택해 줘!");
                return;
            }
            
            document.getElementById('saveConfirmModal').style.display = 'flex';
        }

        function closeSaveModal() {
            document.getElementById('saveConfirmModal').style.display = 'none';
        }

        function executeSave() {
            const fitButtons = document.querySelector('.fit-btn.selected');
            const selectedFit = fitButtons ? fitButtons.textContent : null;
            const selectedTempLevel = document.getElementById('temp-level').value;
            
            location.href = "my_closet.html"; 
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateTempDescription();
        });
    </script>
</body>
</html>
