<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 옷장 - Look_Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
  
        .closet-page-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .closet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 20px;
        }

        .closet-header h2 {
            font-size: 2rem;
            color: #0f172a;
            font-weight: 800;
            margin: 0;
        }

        /* 카테고리별 섹션 */
        .category-section {
            margin-bottom: 50px;
        }

        .category-title {
            font-size: 1.3rem;
            color: #1e293b;
            margin-bottom: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .horizontal-scroll-box {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 15px;
            scroll-behavior: smooth;
         
        }

        .horizontal-scroll-box::-webkit-scrollbar {
            height: 8px;
        }
        
        .horizontal-scroll-box::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        
        .horizontal-scroll-box::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .horizontal-scroll-box::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
