    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
  
        .closet-page-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .closet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 20px;
        }

        .closet-header h2 {
            font-size: 2rem;
            color: #0f172a;
            font-weight: 800;
            margin: 0;
        }

        /* 카테고리별 섹션 */
        .category-section {
            margin-bottom: 50px;
        }

        .category-title {
            font-size: 1.3rem;
            color: #1e293b;
            margin-bottom: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .horizontal-scroll-box {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 15px;
            scroll-behavior: smooth;
         
        }

        .horizontal-scroll-box::-webkit-scrollbar {
            height: 8px;
        }
        
        .horizontal-scroll-box::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        
        .horizontal-scroll-box::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .horizontal-scroll-box::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
/
        .closet-item {
            flex: 0 0 auto; 
            width: 140px;
            height: 140px;
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
            position: relative;
        }

        .closet-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-color: #4f46e5;
        }

        .closet-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .item-label {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            color: #0f172a;
            font-size: 0.8rem;
            text-align: center;
            padding: 8px 0;
            font-weight: 600;
            border-top: 1px solid #e2e8f0;
        }


        .fab-button {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 60px;
            height: 60px;
            background-color: #4f46e5;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
            cursor: pointer;
            text-decoration: none;
            z-index: 1000;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .fab-button:hover {
            transform: scale(1.1);
            background-color: #3730a3;
        }
    </style>
</head>
