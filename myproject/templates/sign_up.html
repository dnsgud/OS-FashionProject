<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - Look_Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        .signup-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 140px);
            background-color: #ffffff;
            padding: 40px 20px;
        }

        .signup-box {
            background: #ffffff;
            border-radius: 24px;
            padding: 45px 35px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.04);
            border: 1px solid #f8fafc;
        }

        .signup-logo {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 35px;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 22px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: #334155;
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            gap: 10px;
        }

        .form-control {
            flex: 1;
            padding: 16px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
            background-color: #f8fafc;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #4f46e5;
            background-color: #ffffff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.08);
        }

        .check-btn {
            padding: 0 18px;
            background-color: #f1f5f9;
            color: #475569;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .check-btn:hover {
            background-color: #e2e8f0;
            color: #0f172a;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: #4f46e5;
            color: #ffffff;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
        }

        .submit-btn:hover {
            background: #4338ca;
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 0.88rem;
            color: #64748b;
        }

        .login-link a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
            margin-left: 6px;
        }

        .flash-messages {
            background-color: #fef2f2;
            border: 1px solid #fca5a5;
            color: #ef4444;
            padding: 14px;
            border-radius: 14px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            list-style: none;
            padding-left: 0;
            text-align: left;
            display: none;
        }
    </style>
</head>

<body>
    <header>
        <nav>
            <div class="logo">
                <a href="{{ url_for('home') }}" style="color: inherit; text-decoration: none;">Look_Up</a>
            </div>
            <ul>
                <li><a href="{{ url_for('guide_page') }}" class="nav-link"
                        style="color: inherit; text-decoration: none;"><i class="fas fa-book"></i> Guide</a></li>
                <li><a href="{{ url_for('codi_page') }}" class="nav-link"
                        style="color: inherit; text-decoration: none;"><i class="fas fa-tshirt"></i> Codi</a></li>
                <li class="dropdown-wrapper">
                    <a href="#" class="nav-link" id="my-menu-btn" style="color: inherit; text-decoration: none;"
                        onclick="toggleDropdown(event)"><i class="fas fa-user"></i> My</a>
                    <div class="dropdown-menu" id="my-dropdown">
                        <a href="{{ url_for('my_closet') }}">👗 내 옷장</a>
                        <a href="{{ url_for('my_scrap') }}">🔖 스크랩북</a>
                        <a href="{{ url_for('my_profile') }}">⚙️ 스타일 설정</a>
                    </div>
                </li>
                <li>
                    {% if logged_in %}
                    <a href="{{ url_for('logout') }}" class="login-btn"
                        style="background-color: #ef4444; text-decoration: none; display: inline-block;">Logout</a>
                    {% else %}
                    <a href="{{ url_for('login') }}" class="login-btn"
                        style="text-decoration: none; display: inline-block;">Login</a>
                    {% endif %}
                </li>
            </ul>
        </nav>
    </header>

    <main class="signup-container">
        <div class="signup-box">
            <div class="signup-logo">
                <a href="{{ url_for('home') }}" style="color: #0f172a; text-decoration: none;">Look_Up</a>
            </div>

            <ul class="flash-messages" id="error-box">
                <li id="error-msg"></li>
            </ul>

            <form class="signup-form" onsubmit="submitRegister(event)">
                <div class="form-group">
                    <label for="user-email">이메일 주소</label>
                    <div class="input-wrapper">
                        <input type="email" id="user-email" class="form-control" placeholder="example@email.com"
                            required>
                        <button type="button" class="check-btn" onclick="checkEmailDuplicate()">중복확인</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="user-nickname">닉네임</label>
                    <input type="text" id="user-nickname" class="form-control" placeholder="멋쟁이 소년" required>
                </div>

                <div class="form-group">
                    <label for="user-password">비밀번호</label>
                    <input type="password" id="user-password" class="form-control" placeholder="8자리 이상 입력해 주세요"
                        required>
                </div>

                <div class="form-group">
                    <label for="user-password-confirm">비밀번호 확인</label>
                    <input type="password" id="user-password-confirm" class="form-control"
                        placeholder="비밀번호를 한번 더 입력해 주세요" required>
                </div>

                <button type="submit" class="submit-btn">회원가입 완료</button>
            </form>

            <div class="login-link">
                이미 회원이신가요?
                <a href="{{ url_for('login') }}">로그인하기</a>
            </div>
        </div>
    </main>

    <script>
        function toggleDropdown(event) {
            event.preventDefault();
            document.getElementById("my-dropdown").classList.toggle("show");
        }

        // [교정] 기존 동기식 전송 탈피 ➡️ app.py의 /api/register JSON 통신 명세 충족
        function submitRegister(event) {
            event.preventDefault();
            const email = document.getElementById('user-email').value;
            const nickname = document.getElementById('user-nickname').value;
            const password = document.getElementById('user-password').value;
            const confirm = document.getElementById('user-password-confirm').value;
            const errorBox = document.getElementById('error-box');
            const errorMsg = document.getElementById('error-msg');

            if (password.length < 8) { alert('비밀번호는 8자리 이상으로 세팅해 줘!'); return; }
            if (password !== confirm) { alert('비밀번호 확인이 불일치해!'); return; }

            fetch("/api/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: email, password: password, nickname: nickname })
            })
                .then(async res => {
                    if (res.ok) {
                        alert('회원가입 성공! 로그인 화면으로 갈게.');
                        location.href = "{{ url_for('login') }}";
                    } else {
                        const data = await res.json();
                        errorMsg.innerText = "❌ " + (data.error || "가입 처리 중 오류 발생");
                        errorBox.style.display = "block";
                    }
                });
        }

        function checkEmailDuplicate() {
            if (!document.getElementById('user-email').value) { alert('이메일을 먼저 적어줘!'); return; }
            alert('사용 가능한 이메일입니다.');
        }
    </script>
</body>

</html>
