<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 분석 결과 - Look_Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
      :root {
        --primary: #4f46e5;
        --bg: #f8fafc;
        --text: #0f172a;
        --border: #e2e8f0;
      }

      body {
        font-family: "Pretendard", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 0;
      }

      header {
        background: white;
        padding: 15px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
      }

      .back-btn {
        background: none;
        border: none;
        font-size: 1.2rem;
        color: #64748b;
        cursor: pointer;
        text-decoration: none;
      }

      main {
        max-width: 1200px;
        margin: 60px auto;
        padding: 0 20px;
      }

      .page-title {
        text-align: center;
        font-size: 2.2rem;
        color: #0f172a;
        margin-bottom: 40px;
        font-weight: 800;
      }

      .upload-card {
        background: #ffffff;
        border-radius: 24px;
        padding: 40px 50px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 50px;
        border: 1px solid #f1f5f9;
        width: 100%;
        box-sizing: border-box;
      }

      .image-section {
        background: #f8fafc;
        border: 2px dashed #cbd5e1;
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
        width: 100%;
        aspect-ratio: 1 / 1;
        box-sizing: border-box;
      }

      #analyzed-img {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .ai-loading {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(255, 255, 255, 0.85);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 10;
      }

      .spinner {
        width: 40px;
        height: 40px;
        border: 4px solid #e2e8f0;
        border-top: 4px solid var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 10px;
      }

      @keyframes spin {
        100% { transform: rotate(360deg); }
      }

      .form-section {
        display: flex;
        flex-direction: column;
        gap: 20px;
        width: 100%;
        box-sizing: border-box;
        justify-content: center;
        min-width: 0;
      }

      .form-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 100%;
        box-sizing: border-box;
        min-width: 0;
      }

      .form-group label {
        font-weight: 600;
        color: #1e293b;
        font-size: 1.05rem;
      }

      .form-input {
        width: 100%;
        box-sizing: border-box;
        padding: 16px 20px;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        font-size: 1.1rem;
        outline: none;
        transition: border-color 0.2s;
        font-family: inherit;
        background: white;
      }

      .form-input:focus { border-color: var(--primary); }

      .color-group { display: flex; align-items: center; gap: 15px; }
      .color-group input[type="color"] { -webkit-appearance: none; appearance: none; width: 55px; height: 55px; padding: 0; border: 2px solid #cbd5e1; border-radius: 50%; cursor: pointer; overflow: hidden; background: none; }
      .color-group input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
      .color-group input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

      .tpo-scroll-container { display: flex; overflow-x: auto; gap: 12px; padding-bottom: 12px; scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
      .tpo-scroll-container::-webkit-scrollbar { height: 8px; display: block; }
      .tpo-scroll-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }

      .tpo-tag { background: #f1f5f9; color: #64748b; padding: 12px 20px; border-radius: 25px; font-size: 1rem; font-weight: 600; white-space: nowrap; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
      .tpo-tag.active { background: #e0e7ff; color: #4f46e5; border-color: #4f46e5; }

      .temp-level-wrapper { background: #f8fafc; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; }
      .temp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
      .temp-display { font-size: 1.3rem; font-weight: 800; color: #4f46e5; background: #e0e7ff; padding: 4px 12px; border-radius: 8px; }
      .temp-slider { appearance: none; -webkit-appearance: none; width: 100%; height: 12px; border-radius: 6px; background: linear-gradient(to right, #ef4444, #f97316, #eab308, #60a5fa, #3b82f6); outline: none; margin: 15px 0; }
      .temp-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #ffffff; border: 3px solid #4f46e5; cursor: pointer; box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2); }
      .temp-description { font-size: 0.95rem; color: #475569; line-height: 1.6; min-height: 48px; word-break: keep-all; border-top: 1px dashed #cbd5e1; padding-top: 12px; margin-top: 5px; }

      .btn-main-save { width: 100%; padding: 20px; border-radius: 16px; font-weight: 800; font-size: 1.2rem; cursor: pointer; border: none; transition: all 0.2s; background: #1e293b; color: white; margin-top: 15px; }
      .btn-main-save:hover { background: #0f172a; }

      .confirm-modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(4px); }
      .confirm-modal-box { background: white; padding: 40px 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1); }
      .confirm-modal-box h3 { font-size: 1.4rem; color: #0f172a; margin-bottom: 30px; font-weight: 700; }
      .modal-btn-group { display: flex; gap: 15px; }
      .m-btn { flex: 1; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; border: none; }
      .m-btn-cancel { background: #f1f5f9; color: #64748b; }
      .m-btn-confirm { background: #4f46e5; color: white; }

      /* 토스트 메시지 스타일 */
      #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 12px; padding: 16px; position: fixed; z-index: 9999; left: 50%; transform: translateX(-50%); bottom: 30px; font-size: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
      #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
      @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
      @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

      @media (max-width: 900px) { .upload-card { grid-template-columns: 1fr; } }
    </style>
  </head>

  <body>
    <header>
      <a href="my_closet" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    </header>

    <main>
      <h1 class="page-title">AI 의상 분석 결과</h1>

      <div class="upload-card">
        <div class="image-section">
          <div class="ai-loading" id="ai-loading">
            <div class="spinner"></div>
            <p style="color: var(--primary); font-weight: 700">AI 의상 분석 중...</p>
          </div>
          <img id="analyzed-img" src="" alt="분석 이미지" />
        </div>

        <div class="form-section">
          <div class="form-group">
            <label>이름</label>
            <input type="text" id="name" class="form-input" placeholder="분석 중..." />
          </div>

          <div class="form-group">
            <label>메인 카테고리</label>
            <select id="category-main" class="form-input">
              <option value="">대분류 선택</option>
              <option value="상의">상의</option>
              <option value="하의">하의</option>
              <option value="신발">신발</option>
            </select>
          </div>

          <div class="form-group">
            <label>서브 카테고리</label>
            <select id="category-sub" class="form-input" disabled>
              <option value="">먼저 메인 카테고리를 선택하세요</option>
            </select>
          </div>

          <div class="form-group">
            <label>핏 선택</label>
            <select id="category-fit" class="form-input" disabled>
              <option value="">먼저 메인 카테고리를 선택해 줘!</option>
            </select>
          </div>

          <div class="form-group">
            <label>색상</label>
            <div class="color-group">
              <input type="color" id="color-picker" value="#000000" onchange="updateColorFromPicker(this.value)" />
              <input type="text" id="color-code" class="form-input" style="width: 120px; text-align: center" readonly />
            </div>
          </div>

          <div class="form-group">
            <label>스타일</label>
            <div class="tpo-scroll-container">
              <span class="tpo-tag tag" onclick="toggleTag(this)">#캐주얼</span>
              <span class="tpo-tag tag" onclick="toggleTag(this)">#데이트</span>
              <span class="tpo-tag tag" onclick="toggleTag(this)">#포멀</span>
              <span class="tpo-tag tag" onclick="toggleTag(this)">#스트릿</span>
              <span class="tpo-tag tag" onclick="toggleTag(this)">#밀리터리룩</span>
              <span class="tpo-tag tag" onclick="toggleTag(this)">#애슬레저</span>
              <span class="tpo-tag tag" onclick="toggleTag(this)">#고프코어</span>
            </div>
          </div>

          <div class="form-group">
            <label>체감 온도 레벨 설정</label>
            <div class="temp-level-wrapper">
              <div class="temp-header">
                <span style="font-size: 0.95rem; color: #64748b; font-weight: 600">내가 느끼는 옷의 두께감</span>
                <span class="temp-display" id="temp-badge">Lv.5</span>
              </div>
              <input type="range" min="1" max="10" value="{{ results.get('temp_level', 5) }}" class="temp-slider" id="temp-slider" name="temp_level" oninput="updateTempLevel(this.value)" />
              <p class="temp-description" id="temp-desc"></p>
            </div>
          </div>

          <button class="btn-main-save" onclick="saveItem()">최종 저장</button>
        </div>
      </div>
    </main>

    <div class="confirm-modal-overlay" id="save-modal">
      <div class="confirm-modal-box">
        <h3>저장하시겠습니까?</h3>
        <div class="modal-btn-group">
          <button class="m-btn m-btn-cancel" onclick="closeModal()">취소</button>
          <button class="m-btn m-btn-confirm" id="confirm-btn" onclick="confirmSave()">확인</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      const clothId = "{{ results.id | default('') }}";
      const userEmail = "{{ user_email | default('') }}";

      const subData = {
        상의: ["이너", "아우터"],
        하의: ["바지"],
        신발: ["운동화", "구두", "스니커즈", "단화", "부츠", "샌들"],
      };

      const fitData = {
        상의: ["슬림핏", "레귤러핏", "오버핏"],
        하의: ["슬림핏", "레귤러핏", "오버핏"],
        신발: ["스탠다드"],
      };

      const tempDescriptions = {
        1: "🌋 <b>[Lv.1 극심한 폭염]</b> 매우 시원한 소재",
        2: "🔥 <b>[Lv.2 폭염 주의]</b> 통기성이 좋은 기능성",
        3: "☀️ <b>[Lv.3 한여름 무더위]</b> 반팔, 반바지",
        4: "🍃 <b>[Lv.4 초여름 날씨]</b> 얇은 셔츠류",
        5: "🌤️ <b>[Lv.5 쾌적한 환절기]</b> 긴팔, 면바지",
        6: "🌾 <b>[Lv.6 완연한 봄·가을]</b> 니트, 맨투맨",
        7: "🍁 <b>[Lv.7 선선한 가을]</b> 자켓, 가디건",
        8: "🧥 <b>[Lv.8 초겨울·늦가을]</b> 트렌치코트",
        9: "❄️ <b>[Lv.9 쌀쌀한 겨울]</b> 코트, 히트텍",
        10: "🥶 <b>[Lv.10 극한의 추위]</b> 패딩, 목도리",
      };

      function showToast(message) {
          const toast = document.getElementById("toast");
          toast.innerText = message;
          toast.className = "show";
          setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
      }

      document.getElementById("category-main").onchange = handleMainCategoryChange;

      function handleMainCategoryChange() {
        const main = document.getElementById("category-main").value;
        const subSelect = document.getElementById("category-sub");
        const fitSelect = document.getElementById("category-fit");

        subSelect.innerHTML = "";
        fitSelect.innerHTML = "";

        if (main) {
          subSelect.disabled = false;
          fitSelect.disabled = false;

          subData[main].forEach((item) => {
            const opt = document.createElement("option");
            opt.value = item;
            opt.innerText = item;
            subSelect.appendChild(opt);
          });

          fitData[main].forEach((item) => {
            const opt = document.createElement("option");
            opt.value = item;
            opt.innerText = item;
            fitSelect.appendChild(opt);
          });
        } else {
          subSelect.disabled = true;
          fitSelect.disabled = true;
          subSelect.innerHTML = '<option value="">먼저 메인 카테고리를 선택하세요</option>';
          fitSelect.innerHTML = '<option value="">먼저 메인 카테고리를 선택해 줘!</option>';
        }
      }

      function toggleTag(el) { el.classList.toggle("active"); }

      function updateTempLevel(value) {
        document.getElementById("temp-badge").innerText = `Lv.${value}`;
        document.getElementById("temp-desc").innerHTML = tempDescriptions[value];
      }

      window.onload = function () {
        const imgData = localStorage.getItem("analyzingImg");
        if (!imgData) {
          showToast("분석할 이미지가 없습니다.");
          location.href = "/upload";
          return;
        }

        document.getElementById("analyzed-img").src = imgData;

        setTimeout(() => {
          document.getElementById("ai-loading").style.display = "none";
          document.getElementById("name").value = "{{ results.detected_name }}";
          document.getElementById("category-main").value = "{{ results.detected_main }}";
          handleMainCategoryChange();
          document.getElementById("category-sub").value = "{{ results.detected_sub }}";
          document.getElementById("category-fit").value = "{{ results.detected_fit }}";
          document.getElementById("color-picker").value = "{{ results.detected_color }}";
          document.getElementById("color-code").value = "{{ results.detected_color }}";
          document.querySelectorAll(".tag")[0].classList.add("active");
          document.getElementById("temp-slider").value = 5;
          updateTempLevel(5);
        }, 2000);
      };

      function updateColorFromPicker(value) { document.getElementById("color-code").value = value; }
      function saveItem() {
        if (!document.getElementById("name").value) { showToast("옷 이름을 입력해 주세요!"); return; }
        document.getElementById("save-modal").style.display = "flex";
      }
      function closeModal() { document.getElementById("save-modal").style.display = "none"; }

      async function confirmSave() {
        const confirmBtn = document.getElementById("confirm-btn");
        confirmBtn.innerText = "저장 중...";
        confirmBtn.disabled = true;

        const activeTags = Array.from(document.querySelectorAll(".tag.active")).map((tag) => tag.innerText.replace("#", ""));

        const payload = {
          cloth_id: clothId,
          user_email: userEmail,
          modified_data: {
            name: document.getElementById("name").value,
            main_category: document.getElementById("category-main").value,
            sub_category: document.getElementById("category-sub").value,
            fit: document.getElementById("category-fit").value,
            color: document.getElementById("color-code").value,
            style: activeTags.join(","),
            temp_level: parseInt(document.getElementById("temp-slider").value),
            is_verified: true,
          },
        };

        try {
          const response = await fetch("/api/clothes/confirm", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (response.ok) {
            showToast("성공적으로 저장되었습니다!");
            setTimeout(() => { location.href = "/my_closet"; }, 1500);
          } else {
            const result = await response.json();
            showToast("실패: " + result.error);
            confirmBtn.innerText = "확인";
            confirmBtn.disabled = false;
          }
        } catch (error) {
          showToast("서버 통신 오류");
          confirmBtn.innerText = "확인";
          confirmBtn.disabled = false;
        }
      }
    </script>
  </body>
</html>
