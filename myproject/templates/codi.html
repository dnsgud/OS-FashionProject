<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맞춤 코디 추천 - Look_Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #f8fafc;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --heart: #ef4444;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
            padding: 60px 20px;
            box-sizing: border-box;
            text-align: center;
        }

        /* 헤더 섹션 */
        .header-section h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .header-section p {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 30px;
        }

        /* 기온 및 버튼 영역 */
        .action-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            border: 1px solid var(--border);
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
        }

        .temp-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: #eff6ff;
            color: #3b82f6;
            border-radius: 20px;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* 스타일 선택 그룹 */
        .style-group {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .style-btn {
            background: white;
            color: var(--text-light);
            border: 1px solid var(--border);
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .style-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .style-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .recommend-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .recommend-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .nav-scrap-btn {
            background: white;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 16px 25px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-scrap-btn:hover {
            background: #f5f3ff;
            transform: translateY(-2px);
        }

        /* 결과 영역 (순위별 리스트) */
        .result-area {
            display: none;
            width: 100%;
            animation: fadeInUp 0.5s ease;
        }

        .rank-section {
            margin-bottom: 40px;
            text-align: left;
        }

        .rank-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .rank-title {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 800;
        }

        .rank-1 {
            background: #e0e7ff;
            color: #4f46e5;
        }

        /* 1순위 강조 */
        .rank-others {
            background: #f1f5f9;
            color: #475569;
        }

        /* 하트 버튼 스타일 */
        .heart-save-btn {
            background: white;
            border: 1px solid var(--border);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: #cbd5e1;
            font-size: 1.2rem;
            z-index: 10;
        }

        .heart-save-btn:hover {
            transform: scale(1.1);
            border-color: var(--heart);
            color: var(--heart);
        }

        .heart-save-btn.active {
            color: var(--heart);
            border-color: var(--heart);
        }

        /* 상하의 세트 카드 가로 정렬 */
        .codi-set-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.02);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .codi-set-wrapper:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.05);
        }

        .item-card {
            text-align: center;
        }

        .item-card .item-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: #94a3b8;
            margin-bottom: 15px;
        }

        .item-img-box {
            width: 100%;
            aspect-ratio: 1.2/1;
            background: #f8fafc;
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 15px;
            font-size: 3rem;
            color: #cbd5e1;
            background-size: cover;
            background-position: center;
        }

        .item-name {
            font-size: 1.1rem;
            font-weight: 800;
            margin-bottom: 6px;
        }

        .item-desc {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        /* 하단 팁 박스 */
        .tip-box {
            background: #eef2ff;
            color: #4338ca;
            padding: 18px 25px;
            border-radius: 16px;
            text-align: left;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
        }

        .empty-msg {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
            font-weight: 600;
        }

        /* ==========================================================================
            모달창 공통 애니메이션 및 스타일 레이아웃 구축
        ========================================================================== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: white;
            width: 95%;
            max-width: 680px;
            border-radius: 24px;
            padding: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            position: relative;
            animation: scaleUp 0.2s ease;
            text-align: center;
        }

        .modal-close-btn {
            position: absolute;
            top: 22px;
            right: 24px;
            background: none;
            border: none;
            font-size: 26px;
            cursor: pointer;
            color: #94a3b8;
            transition: color 0.2s;
        }

        .modal-close-btn:hover {
            color: #475569;
        }

        .modal-body-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 25px;
            padding-bottom: 12px;
            border-bottom: 2px solid #f1f5f9;
        }

        .modal-grid-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        @media (max-width: 550px) {
            .modal-grid-wrapper {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }

        .modal-item-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f8fafc;
            padding: 20px;
            border-radius: 18px;
            border: 1px solid #e2e8f0;
        }

        .modal-column-label {
            font-size: 13px;
            font-weight: 800;
            color: #4f46e5;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .modal-img-box {
            width: 100%;
            aspect-ratio: 1.1/1;
            background-color: #ffffff;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.8rem;
            color: #cbd5e1;
            border: 1px solid #e2e8f0;
        }

        .modal-img-container {
            width: 100%;
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .modal-img-container .modal-img-box {
            flex: 1;
        }

        .modal-item-name {
            font-size: 1.15rem;
            font-weight: 800;
            margin-top: 16px;
            margin-bottom: 6px;
            color: #0f172a;
        }

        .modal-item-meta {
            font-size: 0.88rem;
            color: #64748b;
            font-weight: 500;
        }

        /* 이름 입력 전용 커스텀 모달 스타일 */
        .input-modal-content {
            max-width: 420px;
            padding: 30px;
        }

        .modal-input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 20px;
            box-sizing: border-box;
            outline: none;
        }

        .modal-input:focus {
            border-color: var(--primary);
        }

        .modal-btn-group {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            border: none;
        }

        .modal-confirm {
            background: var(--primary);
            color: white;
        }

        .modal-cancel {
            background: #f1f5f9;
            color: #475569;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes scaleUp {
            from {
                transform: scale(0.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 600px) {
            .codi-set-wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header class="header-section">
            <h1>오늘 당신을 위한 맞춤 코디</h1>
            <p>내 옷장 아이템으로 날씨에 맞는 완벽한 조합을 만들어 줄게!</p>
        </header>

        <section class="action-card">
            <div class="temp-tag">
                <i class="fas fa-thermometer-half"></i> 날씨 분석 중...
            </div>

            <div class="style-group">
                <button class="style-btn" onclick="selectStyle('데이트')">데이트</button>
                <button class="style-btn active" onclick="selectStyle('캐주얼')">캐주얼</button>
                <button class="style-btn" onclick="selectStyle('비즈니스')">비즈니스</button>
                <button class="style-btn" onclick="selectStyle('스트릿')">스트릿</button>
            </div>

            <div class="btn-group">
                <button class="recommend-btn" onclick="recommendCodi()">코디 추천받기</button>
                <button class="nav-scrap-btn" onclick="location.href='/my_scrap'">
                    <i class="fas fa-bookmark"></i> 스크랩북 보기
                </button>
            </div>
        </section>

        <div id="result-container" class="result-area"></div>

        <div id="tip-area" class="result-area">
            <div class="tip-box">
                <i class="fas fa-lightbulb" style="color: #fbbf24;"></i>
                <span id="weather-tip">내 옷장 상태에 기반하여 유연한 매칭 가이드를 산출하고 있습니다.</span>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal-overlay" onclick="closeCodiModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close-btn" onclick="closeCodiModal()">&times;</button>
            <div class="modal-body-title" id="modalTitle">코디 상세보기</div>

            <div class="modal-grid-wrapper">
                <div class="modal-item-column">
                    <div class="modal-column-label">TOP (상의)</div>
                    <div id="modalTopImgs" class="modal-img-container"></div>
                    <div class="modal-item-name" id="modalTopName">-</div>
                    <div class="modal-item-meta" id="modalTopMeta">-</div>
                </div>

                <div class="modal-item-column">
                    <div class="modal-column-label">BOTTOM (하의)</div>
                    <div id="modalBottomImg" class="modal-img-box"></div>
                    <div class="modal-item-name" id="modalBottomName">-</div>
                    <div class="modal-item-meta" id="modalBottomMeta">-</div>
                </div>
            </div>
        </div>
    </div>

    <div id="inputModal" class="modal-overlay">
        <div class="modal-content input-modal-content">
            <div class="modal-body-title" style="font-size: 18px; margin-bottom: 15px;">스크랩 이름 지정</div>
            <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 15px;">이 코디의 멋진 이름을 지정해줘!</p>
            <input type="text" id="customTitleInput" class="modal-input" placeholder="예: 캠퍼스 등교 룩, 주말 데이트">
            <div class="modal-btn-group">
                <button class="modal-btn modal-cancel" onclick="closeInputModal()">취소</button>
                <button class="modal-btn modal-confirm" id="inputModalConfirmBtn">확인</button>
            </div>
        </div>
    </div>

    <div id="alertModal" class="modal-overlay" onclick="closeAlertModal(event)">
        <div class="modal-content" style="max-width: 420px; padding: 30px;" onclick="event.stopPropagation()">
            <div class="modal-body-title" id="alertModalTitle"
                style="font-size: 18px; margin-bottom: 15px; border-bottom: none; padding-bottom: 0;">알림</div>
            <p style="font-size: 15px; line-height: 1.5; color: var(--text); margin-bottom: 25px;"
                id="alertModalMessage">-</p>
            <div style="display: flex; justify-content: center;">
                <button class="modal-btn modal-confirm" onclick="closeAlertModal()"
                    style="max-width: 120px; padding: 10px;">확인</button>
            </div>
        </div>
    </div>

    <script>
        let selectedStyle = '캐주얼';
        let currentRecommendations = []; // 실시간 파싱을 위한 전역 버퍼 배열

        // 커스텀 알림 모달 출력 함수
        function showAlertModal(title, message) {
            document.getElementById('alertModalTitle').innerText = title;
            document.getElementById('alertModalMessage').innerText = message;
            document.getElementById('alertModal').style.display = 'flex';
        }

        // 커스텀 알림 모달 닫기
        function closeAlertModal(event) {
            if (event && event.target !== document.getElementById('alertModal')) return;
            document.getElementById('alertModal').style.display = 'none';
        }

        function selectStyle(styleName) {
            selectedStyle = styleName;

            const buttons = document.querySelectorAll('.style-btn');
            buttons.forEach(btn => {
                if (btn.innerText === styleName) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        function recommendCodi() {
            const container = document.getElementById('result-container');
            container.innerHTML = '<div class="empty-msg"><i class="fas fa-spinner fa-spin"></i> 내 옷장 데이터 실시간 가치 점수 연산 중...</div>';
            container.style.display = 'block';

            fetch(`/api/recommend?tpo=${encodeURIComponent(selectedStyle)}`)
                .then(response => response.json())
                .then(data => {
                    document.querySelector('.temp-tag').innerHTML = `<i class="fas fa-thermometer-half"></i> 현재 기온: ${data.current_temp}°C`;

                    if (data.message) {
                        document.getElementById('weather-tip').innerText = data.message;
                        document.getElementById('tip-area').style.display = 'block';
                    }

                    container.innerHTML = '';
                    const recs = data.recommendations;
                    currentRecommendations = recs || []; // 전역 저장소에 매핑

                    if (!recs || recs.length === 0) {
                        container.innerHTML = '<div class="empty-msg">👗 현재 추천 조건 범위에 부합하는 상/하의 조합 데이터가 옷장에 부족합니다.</div>';
                        return;
                    }

                    recs.forEach((outfit, i) => {
                        const rankClass = (i === 0) ? 'rank-1' : 'rank-others';
                        const rankText = `${selectedStyle} ${i + 1}순위 추천 코디`;

                        const topIds = outfit.top_combo.map(t => t.id);
                        const bottomId = outfit.bottom.id;

                        const topNames = outfit.top_combo.map(t => t.name).join(' + ');
                        const topDesc = `핏: ${outfit.top_combo.map(t => t.fit).join('/')} | 색상: ${outfit.top_combo.map(t => t.color).join(',')}`;

                        const topImgUrl = outfit.top_combo[0].image_url;
                        const bottomImgUrl = outfit.bottom.image_url;

                        const section = document.createElement('div');
                        section.className = 'rank-section';
                        section.innerHTML = `
                            <div class="rank-header">
                                <span class="rank-title ${rankClass}">${i === 0 ? '<i class="fas fa-crown"></i> ' : ''}${rankText}</span>
                                <button class="heart-save-btn" onclick="event.stopPropagation(); prepareScrap(${i}, '${rankText}', this)">
                                    🤍
                                </button>
                            </div>
                            <div class="codi-set-wrapper" onclick="openCodiModalFromIndex(${i}, '${rankText}')">
                                <div class="item-card">
                                    <div class="item-label">TOP (상의)</div>
                                    <div class="item-img-box" style="${topImgUrl ? `background-image:url('${topImgUrl}');` : ''}">
                                        ${!topImgUrl ? '<i class="fas fa-tshirt"></i>' : ''}
                                    </div>
                                    <div class="item-name">${topNames}</div>
                                    <div class="item-desc">${topDesc}</div>
                                </div>
                                <div class="item-card">
                                    <div class="item-label">BOTTOM (하의)</div>
                                    <div class="item-img-box" style="${bottomImgUrl ? `background-image:url('${bottomImgUrl}');` : ''}">
                                        ${!bottomImgUrl ? '<i class="fas fa-socks"></i>' : ''}
                                    </div>
                                    <div class="item-name">${outfit.bottom.name}</div>
                                    <div class="item-desc">핏: ${outfit.bottom.fit} | 색상: ${outfit.bottom.color}</div>
                                </div>
                            </div>
                        `;
                        container.appendChild(section);
                    });

                    window.scrollTo({ top: container.offsetTop - 20, behavior: 'smooth' });
                }
                )
                .catch(err => {
                    console.error("추천 처리 통신 에러 발생:", err);
                    container.innerHTML = '<div class="empty-msg">❌ 데이터를 불러오는 중 웹 서비스 라우터 연동 오류가 발생했습니다.</div>';
                });
        }

        // 추천 카드 클릭 시 호출되는 모달 바인딩 함수
        function openCodiModalFromIndex(index, defaultTitle) {
            const outfit = currentRecommendations[index];
            if (!outfit) return;

            document.getElementById('modalTitle').innerText = defaultTitle;

            const topImgsContainer = document.getElementById('modalTopImgs');
            topImgsContainer.innerHTML = '';

            outfit.top_combo.forEach(top => {
                const imgBox = document.createElement('div');
                imgBox.className = 'modal-img-box';
                if (top.image_url) {
                    imgBox.style.backgroundImage = `url('${top.image_url}')`;
                } else {
                    imgBox.innerHTML = '<i class="fas fa-tshirt"></i>';
                }
                topImgsContainer.appendChild(imgBox);
            });

            document.getElementById('modalTopName').innerText = outfit.top_combo.map(t => t.name).join(' + ');
            document.getElementById('modalTopMeta').innerText = `핏: ${outfit.top_combo.map(t => t.fit).join('/')} | 색상: ${outfit.top_combo.map(t => t.color).join(',')}`;

            const bottomImgBox = document.getElementById('modalBottomImg');
            bottomImgBox.innerHTML = '';
            if (outfit.bottom.image_url) {
                bottomImgBox.style.backgroundImage = `url('${outfit.bottom.image_url}')`;
            } else {
                bottomImgBox.innerHTML = '<i class="fas fa-socks"></i>';
            }

            document.getElementById('modalBottomName').innerText = outfit.bottom.name;
            document.getElementById('modalBottomMeta').innerText = `핏: ${outfit.bottom.fit} | 색상: ${outfit.bottom.color}`;

            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeCodiModal(event) {
            if (event && event.target !== document.getElementById('detailModal') && event.target.className !== 'modal-close-btn') return;
            document.getElementById('detailModal').style.display = 'none';
        }

        // 커스텀 입력 모달 제어 핸들러 함수
        function prepareScrap(index, defaultRankText, btn) {
            if (btn.classList.contains('active')) return;
            const outfit = currentRecommendations[index];
            if (!outfit) return;

            const topIds = outfit.top_combo.map(t => t.id);
            const bottomId = outfit.bottom.id;

            const inputModal = document.getElementById('inputModal');
            const inputField = document.getElementById('customTitleInput');

            inputField.value = '';
            inputField.placeholder = defaultRankText;
            inputModal.style.display = 'flex';

            document.getElementById('inputModalConfirmBtn').onclick = function () {
                let customTitle = inputField.value.trim();
                if (customTitle === "") {
                    customTitle = defaultRankText;
                }
                inputModal.style.display = 'none';
                saveScrapToServer(topIds, bottomId, customTitle, btn);
            };
        }

        function closeInputModal() {
            document.getElementById('inputModal').style.display = 'none';
        }

        function saveScrapToServer(topIds, bottomId, customTitle, btn) {
            fetch('/api/scraps', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    top_ids: topIds,
                    bottom_id: bottomId,
                    custom_title: customTitle
                })
            })
                .then(response => response.json())
                .then(data => {
                    if (data.message) {
                        btn.classList.add('active');
                        btn.innerHTML = '❤️';
                        showAlertModal('💖 스크랩 완료', `[${customTitle}] 코디 조합이 서버 스크랩북에 안전하게 적재되었습니다.`);
                    } else {
                        showAlertModal('⚠️ 인증 오류', data.error || '스크랩 저장 중 인증 오류가 발생했습니다.');
                    }
                })
                .catch(err => {
                    console.error("스크랩 통신 실패 에러:", err);
                    showAlertModal('❌ 통신 실패', '서버와 연결하는 도중 오류가 발생했습니다.');
                });
        }
    </script>
</body>

</html>
