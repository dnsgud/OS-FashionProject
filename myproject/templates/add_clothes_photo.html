<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 사진 등록 - Look_Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
        }

        header {
            background: white;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <header>
        <a href="{{ url_for('my_closet') }}" class="back-btn"
            style="text-decoration: none; display: inline-block; color: #64748b;">
            <i class="fas fa-arrow-left"></i>
        </a>
        <h2 style="margin: 0 auto 0 10px; font-size: 1.2rem; font-weight: 700;">AI 사진 자동 등록</h2>
    </header>

    <main style="max-width: 600px; margin: 40px auto; padding: 0 20px; box-sizing: border-box;">
        <form id="photo-upload-form"
            style="background: white; border-radius: 24px; padding: 30px; border: 1px solid var(--border);">

            <div id="drop-zone" onclick="document.getElementById('file-input').click()"
                style="border: 2px dashed #cbd5e1; border-radius: 16px; padding: 60px 20px; text-align: center; cursor: pointer; background: #f8fafc;">
                <i class="fas fa-cloud-upload-alt" style="font-size: 3.5rem; color: #94a3b8; margin-bottom: 15px;"></i>
                <p style="font-weight: 600; color: #475569; margin: 0 0 5px 0;">클릭하거나 이미지를 드래그하세요</p>
                <p style="font-size: 0.85rem; color: #94a3b8; margin: 0;">AI가 자동으로 카테고리와 색상을 분석합니다</p>
                <input type="file" id="file-input" name="cloth_image" accept="image/*" style="display: none;"
                    onchange="previewImage(this)">
            </div>

            <div id="preview-container" style="display: none; margin-top: 25px; text-align: center;">
                <img id="img-preview" src="" alt="미리보기"
                    style="max-width: 100%; max-height: 280px; border-radius: 12px; object-fit: cover;">
                <p style="font-size: 0.9rem; color: #4f46e5; font-weight: 600; margin-top: 15px;">
                    ✨ 사진이 업로드되었습니다. 아래 버튼을 누르면 AI 분석이 시작됩니다.
                </p>
            </div>

            <button type="submit" id="submit-btn"
                style="width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 16px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 25px;">
                <span id="btn-text">옷장에 최종 추가하기</span>
            </button>
        </form>
    </main>

    <script>
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    document.getElementById('img-preview').src = e.target.result;
                    document.getElementById('preview-container').style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        document.getElementById('photo-upload-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const fileInput = document.getElementById('file-input');
            if (!fileInput.files || fileInput.files.length === 0) {
                alert('사진 파일을 먼저 선택해 주세요.');
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');

            submitBtn.disabled = true;
            submitBtn.style.background = '#818cf8';
            btnText.innerHTML = '<span class="spinner"></span>AI가 옷 분석 중... 잠시만 기다려주세요';

            // 오직 파일만 담아서 보냅니다.
            const formData = new FormData();
            formData.append('cloth_image', fileInput.files[0]);

            try {
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (response.ok) {
                    alert('🎉 AI 분석 및 옷장 등록 성공!');
                    window.location.href = "{{ url_for('my_closet') }}";
                } else {
                    alert('❌ 등록 실패: ' + (result.error || '오류 발생'));
                    resetSubmitButton();
                }
            } catch (error) {
                alert('❌ 서버와 통신 중 오류가 발생했습니다.');
                resetSubmitButton();
            }
        });

        function resetSubmitButton() {
            const submitBtn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            submitBtn.disabled = false;
            submitBtn.style.background = 'var(--primary)';
            btnText.innerText = '옷장에 최종 추가하기';
        }
    </script>
</body>

</html>
