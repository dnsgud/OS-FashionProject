<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Look_Up - Fashion Guide</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }
    </script>

    <main class="guide-page-container">
        <h1 class="guide-main-title">Fashion Guide for Beginners</h1>

        <div class="guide-grid">
            <!-- section을 a 태그로 감싸서 클릭 가능하게 만듭니다 -->
            <a href="{{ url_for('guide_dictionary') }}" style="text-decoration: none; color: inherit;">
                <section class="guide-card">
                    <h2>🧺 기본 패션 아이템 도감</h2>
                    <p>돌려 입기 좋은 최소한의 필수 아이템 리스트</p>
                </section>
            </a>

            <a href="{{ url_for('body_guide') }}" style="text-decoration: none; color: inherit;">
                <section class="guide-card">
                    <h2>👤 체형별 가이드</h2>
                    <p>자신의 체형에 맞는 최적의 실루엣 추천</p>
                </section>
            </a>

            <a href="{{ url_for('tpo_guide') }}" style="text-decoration: none; color: inherit;">
                <section class="guide-card">
                    <h2>📅 TPO 가이드</h2>
                    <p>상황별(캠퍼스, 데이트, 면접) 코디 공식</p>
                </section>
            </a>

            <a href="{{ url_for('color_guide') }}" style="text-decoration: none; color: inherit;">
                <section class="guide-card">
                    <h2>🎨 컬러 매칭</h2>
                    <p>실패 없는 색 조합 가이드</p>
                </section>
            </a>
        </div>

        <div class="back-home">
            <a href="{{ url_for('home') }}">← 메인으로 돌아가기</a>
        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
