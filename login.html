<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - Look_Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: #fff;
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
        }
        .login-logo {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .login-form input {
            width: 100%;
            padding: 15px 20px;
            margin-bottom: 15px;
            border: 1px solid #f1f3f5;
            border-radius: 12px;
            background: #f8f9fa;
            font-size: 16px;
            outline: none;
            transition: all 0.2s;
            box-sizing: border-box; /* 패딩 때문에 박스가 안 튀어나가게 설정 */
        }
        .login-form input:focus {
            border-color: #212529;
            background: #fff;
        }
        .submit-btn {
            width: 100%;
            padding: 15px;
            background: #212529;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
        }
        /* 소셜 로그인용 스타일 추가 */
        .login-footer { margin-top: 25px; font-size: 14px; color: #868e96; }
        .login-footer a { color: #212529; font-weight: 600; text-decoration: none; }
        .social-login { margin-top: 30px; border-top: 1px solid #f1f3f5; padding-top: 25px; }
        .social-btn {
            width: 100%; padding: 12px; border: 1px solid #dee2e6; border-radius: 12px;
            background: #fff; display: flex; align-items: center; justify-content: center;
            gap: 10px; font-weight: 600; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">Look_Up</div>
        
        <!-- 폼 태그 하나로 통합! -->
        <form class="login-form" onsubmit="handleLogin(event)">
            <input type="text" placeholder="아이디" required>
            <input type="password" placeholder="비밀번호" required>
            <button type="submit" class="submit-btn">로그인</button>
        </form>

        <div class="login-footer">
            아직 회원이 아니신가요? <a href="#">회원가입</a>
        </div>

        <div class="social-login">
            <p style="font-size: 12px; color: #adb5bd; margin-bottom: 15px;">간편 로그인</p>
            <button type="button" class="social-btn">
                <i class="fab fa-google"></i> Google로 시작하기
            </button>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            alert("로그인 기능은 백엔드 연결 후 작동해! 일단 메인으로 보낼게.");
            location.href = "index.html";
        }
    </script>
</body>
</html>
